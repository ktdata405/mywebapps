<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>Denominations Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b, #0f172a);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: var(--accent); top: 40%; left: 60%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .accordion-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
        }

        .accordion-content.active {
            opacity: 1;
            padding-top: 0;
            padding-bottom: 0;
        }

        .rotate-icon {
            transition: transform 0.3s ease;
        }

        .rotate-icon.active {
            transform: rotate(180deg);
        }

        /* Custom Scrollbar for Accordion Content */
        .custom-scroll {
            overflow-y: auto;
            max-height: 300px; /* Adjust as needed */
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim);
        }

        footer b {
            color: var(--text-light);
        }

        /* ===== MOBILE RESPONSIVE IMPROVEMENTS ===== */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        button, a {
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        /* Sticky header fix for mobile */
        @media (max-width: 640px) {
            body.p-4.md\\:p-10 {
                padding: 0.75rem !important;
            }

            .glass-card.flex.justify-between.items-center.mb-6.p-4.rounded-xl.sticky.top-4 {
                top: 0 !important;
                border-radius: 0 0 0.75rem 0.75rem !important;
                margin-left: -0.75rem;
                margin-right: -0.75rem;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            h5.text-xl { font-size: 1rem !important; }

            /* Available balance card responsive */
            #sheet2-data-container .text-2xl { font-size: 1.5rem !important; }

            /* List items - better spacing */
            #report-container > div {
                border-radius: 0.75rem;
            }

            /* Denomination chips wrap nicely */
            .flex.flex-wrap.gap-2 {
                gap: 0.375rem !important;
            }

            /* Details grid - full width on mobile */
            .grid.grid-cols-1.sm\\:grid-cols-2 {
                grid-template-columns: 1fr !important;
            }

            /* Popup - wider on mobile */
            .popup-content {
                width: 92vw !important;
                max-width: 92vw !important;
            }
        }

        /* iOS input zoom prevention */
        input, select, textarea {
            font-size: 16px !important;
        }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* Touch momentum scroll */
        #report-container {
            -webkit-overflow-scrolling: touch;
        }

        /* Loader icon bigger on mobile */
        @media (max-width: 768px) {
            #loader i.text-4xl { font-size: 2.5rem !important; }
        }

        /* ===== MOBILE ENHANCEMENTS ===== */
        .kt-toast {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc;
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
            max-width: 90vw;
        }
        .kt-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .kt-toast.success { border-color: rgba(16,185,129,0.5); }
        .kt-toast.error { border-color: rgba(239,68,68,0.5); }

        .ptr-indicator {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 0.5rem);
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 100;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .ptr-indicator.visible { transform: translateX(-50%) translateY(0); }
        .ptr-indicator.refreshing .ptr-icon { animation: ptr-spin 1s linear infinite; }
        @keyframes ptr-spin { to { transform: rotate(360deg); } }

        .kt-fab {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            right: max(1.25rem, env(safe-area-inset-right));
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
        }
        .kt-fab:active { transform: scale(0.92); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        @media (min-width: 768px) { .kt-fab { display: none; } }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* Popup Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
        }

        .popup-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
        }

        .popup-success .popup-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .popup-error .popup-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
    </style>
</head>

<body class="p-3 md:p-10 pb-8" style="padding-bottom: calc(2rem + env(safe-area-inset-bottom));">

<div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="max-w-4xl mx-auto">
    <div class="glass-card flex flex-row justify-between items-center mb-6 p-3 sm:p-4 rounded-xl sticky top-0 z-10">
        <h5 class="text-sm sm:text-xl font-bold flex items-center gap-2 text-white truncate">
            <i class="fa-solid fa-chart-pie text-emerald-400 shrink-0"></i>
            <span class="truncate">Denominations Report</span>
        </h5>
        <div class="flex gap-2 shrink-0 ml-2">
            <button onclick="fetchData()" class="bg-blue-500/20 hover:bg-blue-500/30 active:bg-blue-500/50 text-blue-300 border border-blue-500/30 w-9 h-9 sm:w-11 sm:h-11 rounded-full transition flex items-center justify-center shadow-sm" title="Refresh">
                <i class="fa-solid fa-sync text-xs sm:text-sm"></i>
            </button>
            <a href="denominations.html" class="bg-white/10 hover:bg-white/20 active:bg-white/30 text-white w-9 h-9 sm:w-11 sm:h-11 rounded-full transition flex items-center justify-center" title="Add New">
                <i class="fa-solid fa-plus text-xs sm:text-sm"></i>
            </a>
            <a href="../index.html" class="bg-white/10 hover:bg-white/20 active:bg-white/30 text-white w-9 h-9 sm:w-11 sm:h-11 rounded-full transition flex items-center justify-center" title="Home">
                <i class="fa-solid fa-house text-xs sm:text-sm"></i>
            </a>

    </div>

    <div id="sheet2-data-container" class="hidden mb-8 flex justify-center">

        <p class="text-xl">No reports found</p>

</div>

<!-- Custom Popup -->
<div id="custom-popup" class="popup-overlay">
    <div class="popup-content">
        <div id="popup-icon-container" class="popup-icon">
            <!-- Icon will be inserted here -->
        </div>
        <h3 id="popup-title" class="text-xl font-bold text-white mb-2"></h3>
        <p id="popup-message" class="text-gray-300 mb-6"></p>
        <button onclick="closePopup()" class="bg-white/10 hover:bg-white/20 text-white py-2 px-6 rounded-lg font-semibold transition w-full">
            OK
        </button>
    </div>
</div>

<script>
    function formatDate(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString;

        const day = String(date.getDate()).padStart(2, '0');
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = months[date.getMonth()];
        const year = date.getFullYear();

        return `${day} ${month} ${year}`;
    }

    function getDateParts(dateString) {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return { day: '-', month: '-', year: '-' };
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return {
            day: String(date.getDate()).padStart(2, '0'),
            month: months[date.getMonth()],
            year: date.getFullYear()
        };
    }

    function formatDateForInput(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return '';

        const offset = date.getTimezoneOffset();
        const adjustedDate = new Date(date.getTime() - (offset * 60 * 1000));
        return adjustedDate.toISOString().split('T')[0];
    }

    function formatCurrency(amount) {
        const num = parseFloat(amount);
        if (isNaN(num)) return amount;

        return new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            maximumFractionDigits: 0
        }).format(num);
    }

    function toggleAccordion(element) {
        const content = element.nextElementSibling;
        const icon = element.querySelector('.rotate-icon');

        if (content.style.maxHeight) {
            content.style.maxHeight = null;
            content.classList.remove('active');
            icon.classList.remove('active');
        } else {
            content.classList.add('active');
            content.style.maxHeight = content.scrollHeight + "px";
            icon.classList.add('active');
        }
    }

    function updateContentHeight(content) {
        if (content.classList.contains('active')) {
            content.style.maxHeight = content.scrollHeight + "px";
        }
    }

    function renderViewMode(contentContainer, data, headerElement) {
        contentContainer.innerHTML = '';
        const innerPadding = document.createElement('div');
        innerPadding.className = 'p-4 sm:p-6 space-y-6';

        // --- Denominations Section ---
        const denomsSection = document.createElement('div');

        const denomTitle = document.createElement('h4');
        denomTitle.className = 'text-xs font-bold text-gray-500 uppercase mb-3 tracking-wider flex items-center gap-2';
        denomTitle.innerHTML = '<i class="fa-solid fa-coins text-yellow-500"></i> Denominations';
        denomsSection.appendChild(denomTitle);

        const denomsGrid = document.createElement('div');
        denomsGrid.className = 'flex flex-wrap gap-2';

        const denoms = [
            { key: '500', label: '500', color: 'text-blue-300', bg: 'bg-blue-500/20', border: 'border-blue-500/30' },
            { key: '200', label: '200', color: 'text-orange-300', bg: 'bg-orange-500/20', border: 'border-orange-500/30' },
            { key: '100', label: '100', color: 'text-emerald-300', bg: 'bg-emerald-500/20', border: 'border-emerald-500/30' },
            { key: '50', label: '50', color: 'text-pink-300', bg: 'bg-pink-500/20', border: 'border-pink-500/30' },
            { key: '20', label: '20', color: 'text-indigo-300', bg: 'bg-indigo-500/20', border: 'border-indigo-500/30' },
            { key: '10', label: '10', color: 'text-red-300', bg: 'bg-red-500/20', border: 'border-red-500/30' },
            { key: '5', label: '5', color: 'text-slate-300', bg: 'bg-slate-500/20', border: 'border-slate-500/30' },
            { key: '2', label: '2', color: 'text-slate-300', bg: 'bg-slate-500/20', border: 'border-slate-500/30' },
            { key: '1', label: '1', color: 'text-slate-300', bg: 'bg-slate-500/20', border: 'border-slate-500/30' }
        ];

        denoms.forEach(d => {
            let value = data[d.key] || 0;
            if (value > 0) {
                 const item = document.createElement('div');
                 item.className = `${d.bg} ${d.border} border rounded-full px-3 py-1.5 flex items-center gap-2 shadow-sm`;
                 item.innerHTML = `
                    <span class="font-bold ${d.color} text-xs">₹${d.label}</span>
                    <span class="w-px h-3 bg-white/20"></span>
                    <span class="font-mono font-bold text-white text-sm">${value}</span>
                `;
                denomsGrid.appendChild(item);
            } else {
                 const item = document.createElement('div');
                 item.className = `bg-white/5 border border-white/5 rounded-full px-3 py-1.5 flex items-center gap-2 opacity-50 grayscale`;
                 item.innerHTML = `
                    <span class="font-bold text-gray-400 text-xs">₹${d.label}</span>
                    <span class="w-px h-3 bg-white/10"></span>
                    <span class="font-mono font-bold text-gray-500 text-sm">0</span>
                `;
                denomsGrid.appendChild(item);
            }
        });
        denomsSection.appendChild(denomsGrid);
        innerPadding.appendChild(denomsSection);

        // --- Additional Details Section ---
        const detailsSection = document.createElement('div');

        const fieldOrder = ['Week Expenses', 'Adjust Amount', 'ATM Withdrawal', 'A/C Paid', 'Remarks'];
        const allKeys = new Set([...fieldOrder, ...Object.keys(data)]);
        const handledKeys = ['Date', 'Total', '500', '200', '100', '50', '20', '10', '5', '2', '1', 'rowIndex'];

        const detailsData = [];
        let remarksData = null;

        allKeys.forEach(key => {
            if (handledKeys.includes(key)) return;
            let value = data[key];
            if (data.hasOwnProperty(key) && value !== null && value !== '') {
                if (key === 'Remarks') {
                    remarksData = { key, value };
                } else {
                    detailsData.push({ key, value });
                }
            }
        });

        if (detailsData.length > 0 || remarksData) {
            const separator = document.createElement('div');
            separator.className = 'h-px bg-gradient-to-r from-transparent via-white/10 to-transparent';
            innerPadding.appendChild(separator);

            const detailsTitle = document.createElement('h4');
            detailsTitle.className = 'text-xs font-bold text-gray-500 uppercase mb-3 tracking-wider flex items-center gap-2';
            detailsTitle.innerHTML = '<i class="fa-solid fa-layer-group text-purple-400"></i> Details';
            detailsSection.appendChild(detailsTitle);

            const detailsGrid = document.createElement('div');
            detailsGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2 text-sm';

            detailsData.forEach(item => {
                const key = item.key;
                let value = item.value;

                const isCurrencyCandidate = !isNaN(parseFloat(value)) && isFinite(value);
                const displayValue = isCurrencyCandidate ? formatCurrency(value) : value;

                const listItem = document.createElement('div');
                listItem.className = 'flex justify-between items-baseline border-b border-white/5 pb-2';
                listItem.innerHTML = `
                    <span class="text-gray-400">${key}</span>
                    <span class="font-bold text-white">${displayValue}</span>
                `;
                detailsGrid.appendChild(listItem);
            });
            detailsSection.appendChild(detailsGrid);

            if (remarksData) {
                const remarksItem = document.createElement('div');
                remarksItem.className = 'mt-4';
                remarksItem.innerHTML = `
                    <div class="text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">Remarks</div>
                    <div class="text-sm text-gray-400 italic p-3 bg-white/5 rounded-lg border border-white/5">"${remarksData.value}"</div>
                `;
                detailsSection.appendChild(remarksItem);
            }

            innerPadding.appendChild(detailsSection);
        }

        // Create scrollable wrapper
        const scrollWrapper = document.createElement('div');
        scrollWrapper.className = 'custom-scroll';
        scrollWrapper.appendChild(innerPadding);
        contentContainer.appendChild(scrollWrapper);

        setTimeout(() => updateContentHeight(contentContainer), 50);
    }

    function createListItem(data) {
        const itemContainer = document.createElement('div');
        itemContainer.className = 'glass-card rounded-xl overflow-hidden transition-all duration-300 hover:border-white/20';

        const header = document.createElement('div');
        header.className = 'p-4 flex items-center justify-between cursor-pointer select-none relative group';
        header.onclick = () => toggleAccordion(header);

        // Left: Date
        const leftSection = document.createElement('div');
        leftSection.className = 'flex items-center gap-4';

        const dateParts = getDateParts(data.Date);

        const iconBox = document.createElement('div');
        iconBox.className = 'w-12 h-12 rounded-xl bg-gradient-to-br from-white/5 to-white/10 flex flex-col items-center justify-center border border-white/10 shadow-sm group-hover:border-blue-500/30 transition-colors';
        iconBox.innerHTML = `
            <div class="text-[10px] text-blue-400 uppercase font-bold leading-none mb-0.5">${dateParts.month}</div>
            <div class="text-xl text-gray-200 leading-none">${dateParts.day}</div>
            <div class="text-[8px] text-gray-400 font-bold leading-none mt-0.5">${dateParts.year}</div>
        `;

        const dateInfo = document.createElement('div');
        dateInfo.className = 'hidden sm:block';
        dateInfo.innerHTML = `
            <div class="font-bold text-gray-200 text-sm">${formatDate(data.Date)}</div>
            <div class="text-xs text-gray-500">Tap to view details</div>
        `;

        leftSection.appendChild(iconBox);
        leftSection.appendChild(dateInfo);

        // Right: Amounts & Controls
        const rightSection = document.createElement('div');
        rightSection.className = 'flex items-center gap-3 sm:gap-5';

        const amountsDiv = document.createElement('div');
        amountsDiv.className = 'flex flex-col items-end text-right';

        const acPaidVal   = parseFloat(data['A/C Paid']) || 0;
        const closingKey  = Object.keys(data).find(k => k.toLowerCase().includes('closing')) || '';
        const closingBal  = closingKey ? (parseFloat(data[closingKey]) || 0) : 0;
        const closingColor = closingBal >= 0 ? 'text-sky-300' : 'text-red-400';

        // Row 1: Offerings
        let amountsHTML = `
            <div class="flex items-center gap-2 mb-0.5">
                <span class="text-[10px] text-emerald-300/70 uppercase font-bold tracking-wider">Offerings</span>
                <span class="text-base sm:text-lg font-bold text-emerald-400">${formatCurrency(data.Total)}</span>
            </div>`;

        // Row 2: A/C Paid (if non-zero)
        if (acPaidVal !== 0) {
            amountsHTML += `
            <div class="flex items-center gap-2 mb-0.5">
                <span class="text-[10px] text-purple-300 uppercase font-bold tracking-wider">A/C Paid</span>
                <span class="text-xs font-bold text-purple-300">${formatCurrency(acPaidVal)}</span>
            </div>`;
        }

        // Row 3: Closing Bal (same value shown in details section)
        if (closingKey) {
            amountsHTML += `
            <div class="flex items-center gap-2">
                <span class="text-[10px] text-sky-300/70 uppercase font-bold tracking-wider">Week Avl Bal</span>
                <span class="text-xs font-bold ${closingColor}">${formatCurrency(closingBal)}</span>
            </div>`;
        }

        amountsDiv.innerHTML = amountsHTML;


        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'flex items-center gap-1 pl-3 border-l border-white/10 ml-1';

        const editBtn = document.createElement('button');
        editBtn.className = 'w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-gray-400 hover:text-blue-400 transition-colors';
        editBtn.innerHTML = '<i class="fa-solid fa-pen text-xs"></i>';
        editBtn.onclick = (e) => {
            e.stopPropagation();
            localStorage.setItem('editReportData', JSON.stringify(data));
            window.location.href = 'denominations.html';
        };

        const chevron = document.createElement('div');
        chevron.className = 'w-8 h-8 rounded-full flex items-center justify-center text-gray-500 rotate-icon transition-transform duration-300 group-hover:text-white';
        chevron.innerHTML = '<i class="fa-solid fa-chevron-down text-xs"></i>';

        controlsDiv.appendChild(editBtn);
        controlsDiv.appendChild(chevron);

        rightSection.appendChild(amountsDiv);
        rightSection.appendChild(controlsDiv);

        header.appendChild(leftSection);
        header.appendChild(rightSection);

        const content = document.createElement('div');
        content.className = 'accordion-content bg-black/20 border-t border-white/5';

        itemContainer.appendChild(header);
        renderViewMode(content, data, header);
        itemContainer.appendChild(content);

        return itemContainer;
    }

    // Popup Functions
    function showPopup(title, message, type = 'success') {
        const popup = document.getElementById('custom-popup');
        const titleEl = document.getElementById('popup-title');
        const messageEl = document.getElementById('popup-message');
        const iconContainer = document.getElementById('popup-icon-container');

        titleEl.textContent = title;
        messageEl.textContent = message;

        // Reset classes
        popup.classList.remove('popup-success', 'popup-error');

        if (type === 'success') {
            popup.classList.add('popup-success');
            iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else {
            popup.classList.add('popup-error');
            iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        }

        popup.classList.add('active');
    }

    function closePopup() {
        const popup = document.getElementById('custom-popup');
        popup.classList.remove('active');
    }

    function fetchData() {
        const loader = document.getElementById('loader');
        const container = document.getElementById('report-container');
        const emptyState = document.getElementById('empty-state');
        const sheet2Container = document.getElementById('sheet2-data-container');
        const sheet2Value = document.getElementById('sheet2-value');

        loader.classList.remove('hidden');
        container.classList.add('hidden');
        emptyState.classList.add('hidden');
        sheet2Container.classList.add('hidden');
        container.innerHTML = '';

        fetch(CONFIG.GOOGLE_SHEET_URL_DENOMINATIONS)
            .then(response => response.json())
            .then(responsePayload => {
                loader.classList.add('hidden');

                if (responsePayload.sheet2Data !== undefined && responsePayload.sheet2Data !== null && responsePayload.sheet2Data !== '') {
                    sheet2Value.textContent = formatCurrency(responsePayload.sheet2Data);
                    sheet2Container.classList.remove('hidden');
                }

                const data = responsePayload.reports;
                if (data && data.length > 0) {
                    container.classList.remove('hidden');
                    data.forEach(item => container.appendChild(createListItem(item)));
                } else {
                    emptyState.classList.remove('hidden');
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                loader.classList.add('hidden');
                emptyState.innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation text-6xl mb-4 text-red-400"></i>
                        <p class="text-xl text-red-300">Error loading reports</p>
                        <p class="text-sm text-gray-400 mt-2">${error.message}</p>
                    `;
                emptyState.classList.remove('hidden');
            });
    }

    document.addEventListener('DOMContentLoaded', fetchData);

    // ===== MOBILE ENHANCEMENTS =====
    // Toast notification
    function showToast(msg, type = 'success', duration = 2800) {
        let toast = document.getElementById('kt-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'kt-toast';
            toast.className = 'kt-toast';
            document.body.appendChild(toast);
        }
        const icon = type === 'success' ? '✓' : '✕';
        const color = type === 'success' ? '#34d399' : '#f87171';
        toast.innerHTML = `<span style="color:${color};font-size:1rem;">${icon}</span> ${msg}`;
        toast.className = `kt-toast ${type}`;
        requestAnimationFrame(() => { toast.classList.add('show'); });
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => { toast.classList.remove('show'); }, duration);
    }

    // Pull-to-refresh
    (function initPTR() {
        const ptr = document.createElement('div');
        ptr.className = 'ptr-indicator';
        ptr.innerHTML = '<i class="fa-solid fa-arrows-rotate ptr-icon"></i><span class="ptr-text">Pull to refresh</span>';
        document.body.appendChild(ptr);

        let startY = 0, pulling = false, threshold = 80;
        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
        }, { passive: true });
        document.addEventListener('touchmove', e => {
            if (!pulling) return;
            const dy = e.touches[0].clientY - startY;
            if (dy > 30) { ptr.classList.add('visible'); ptr.querySelector('.ptr-text').textContent = dy > threshold ? 'Release to refresh' : 'Pull to refresh'; }
        }, { passive: true });
        document.addEventListener('touchend', e => {
            if (!pulling) return;
            pulling = false;
            const dy = e.changedTouches[0].clientY - startY;
            if (dy > threshold) {
                ptr.classList.add('refreshing');
                ptr.querySelector('.ptr-text').textContent = 'Refreshing…';
                if (navigator.vibrate) navigator.vibrate(30);
                fetchData();
                setTimeout(() => { ptr.classList.remove('visible', 'refreshing'); }, 1200);
            } else {
                ptr.classList.remove('visible');
            }
        }, { passive: true });
    })();
</script>
