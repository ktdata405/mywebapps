<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Counter · Denominations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <style>
        :root {
            --bg:        #09090b;
            --surface:   #18181b;
            --surface2:  #27272a;
            --border:    rgba(255,255,255,0.07);
            --text:      #fafafa;
            --muted:     #71717a;
            --accent:    #6366f1;
            --accent-lt: #818cf8;
            --green:     #22c55e;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

        .topbar { background: rgba(9,9,11,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
        .card-inner { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; }
        .total-glow { background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%), var(--surface); border: 1px solid rgba(99,102,241,0.25); }

        #grand-total {
            font-size: clamp(2.4rem, 6vw, 3.2rem); font-weight: 900; letter-spacing: -0.03em;
            background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
        }

        #date-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 8px 14px; font-size: 0.9rem; font-weight: 600; font-family: 'Inter', sans-serif; outline: none; text-align: center; cursor: pointer; }
        #date-input:focus { border-color: var(--accent); }
        .nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; }
        .nav-btn:hover { background: var(--surface); color: var(--text); border-color: rgba(255,255,255,0.15); }

        .denom-row { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; overflow: hidden; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .denom-row:hover { border-color: rgba(255,255,255,0.12); }
        .denom-row.has-value { border-color: rgba(99,102,241,0.4); box-shadow: 0 0 0 1px rgba(99,102,241,0.15), 0 4px 24px rgba(99,102,241,0.1); }

        .denom-pill { width: 80px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 10px; position: relative; }
        .denom-pill::after { content: ''; position: absolute; right: 0; top: 20%; bottom: 20%; width: 1px; background: var(--border); }
        .denom-pill .rupee { font-size: 0.6rem; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; }
        .denom-pill .amount { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
        .denom-pill .kind { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

        .denom-mid { flex: 1; display: flex; align-items: center; padding: 12px 16px; gap: 10px; }
        .denom-lbl { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
        .stepper-wrap { display: flex; align-items: center; gap: 6px; }
        .stp-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s ease; -webkit-tap-highlight-color: transparent; }
        .stp-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .stp-btn:active { transform: scale(0.88); }
        .count-input { width: 60px; height: 30px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; font-weight: 700; text-align: center; outline: none; padding: 0 4px; transition: border-color 0.2s ease; -moz-appearance: textfield; font-family: 'Inter', sans-serif; }
        .count-input::-webkit-outer-spin-button, .count-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .count-input:focus { border-color: var(--accent); }
        .count-input.active { border-color: rgba(99,102,241,0.5); }

        .denom-total { min-width: 88px; padding: 12px 16px 12px 8px; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .row-lbl { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
        .row-amt { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; font-variant-numeric: tabular-nums; transition: color 0.2s ease; }

        .section-divider { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
        .section-divider span { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
        .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .field-wrap { display: flex; flex-direction: column; gap: 5px; }
        .field-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
        .field-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 0.9rem; font-weight: 500; font-family: 'Inter', sans-serif; outline: none; width: 100%; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .field-input[readonly] { color: var(--accent-lt); }
        textarea.field-input { resize: none; }

        .btn-save { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; padding: 13px 24px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(99,102,241,0.35); font-family: 'Inter', sans-serif; width: 100%; justify-content: center; }
        .btn-save:hover { opacity: 0.9; box-shadow: 0 6px 28px rgba(99,102,241,0.5); transform: translateY(-1px); }
        .btn-save:active { transform: scale(0.97); }
        .btn-save:disabled { opacity: 0.55; pointer-events: none; }
        .btn-clear { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 13px 24px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s ease; font-family: 'Inter', sans-serif; width: 100%; justify-content: center; }
        .btn-clear:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.5); }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #loader.hidden { display: none; }
        .loader-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 48px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 9998; opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease; }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; max-width: 380px; width: 90%; text-align: center; transform: scale(0.88); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
        .popup-overlay.active .popup-box { transform: scale(1); }
        .popup-icon-wrap { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 16px; }
        .popup-success .popup-icon-wrap { background: rgba(34,197,94,0.15); color: var(--green); }
        .popup-error   .popup-icon-wrap { background: rgba(239,68,68,0.15); color: #f87171; }
        .popup-ok { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 32px; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Inter',sans-serif; font-size: 0.9rem; transition: background 0.15s ease; margin-top: 4px; }
        .popup-ok:hover { background: rgba(255,255,255,0.08); }

        #calculator-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9997; }
        #calculator-modal.hidden { display: none; }
        .calc-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 320px; }
        .calc-screen { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; text-align: right; margin-bottom: 16px; min-height: 88px; display: flex; flex-direction: column; justify-content: flex-end; }
        #calc-history { font-size: 0.8rem; color: var(--muted); font-family: monospace; min-height: 22px; }
        #calc-display  { font-size: 2.2rem; font-weight: 800; font-family: 'Inter', sans-serif; letter-spacing: -0.03em; line-height: 1; }
        .calc-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
        .calc-btn { padding: 0; height: 52px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.12s ease; font-family: 'Inter', sans-serif; }
        .calc-btn:hover { background: rgba(255,255,255,0.08); }
        .calc-btn:active { transform: scale(0.93); }
        .calc-btn.op  { background: rgba(99,102,241,0.15); color: var(--accent-lt); border-color: rgba(99,102,241,0.25); }
        .calc-btn.op:hover { background: rgba(99,102,241,0.25); }
        .calc-btn.eq  { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; border-color: transparent; }
        .calc-btn.eq:hover { opacity: 0.88; }
        .calc-btn.del { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.2); }
        .calc-btn.del:hover { background: rgba(239,68,68,0.2); }
        .calc-btn.ac  { background: rgba(239,68,68,0.12); color: #f87171; border-color: rgba(239,68,68,0.2); }
        .calc-btn.ac:hover { background: rgba(239,68,68,0.2); }
        .calc-btn.span2 { grid-column: span 2; }

        footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.78rem; }
        footer b { color: var(--accent-lt); }

        /* Denomination color themes */
        .note-500 .denom-pill { background: linear-gradient(160deg,#3d2a00,#6e4b00); }
        .note-500 .amount,.note-500 .rupee,.note-500 .row-amt { color: #f5c842; }
        .note-200 .denom-pill { background: linear-gradient(160deg,#0d2b1e,#1e5e38); }
        .note-200 .amount,.note-200 .rupee,.note-200 .row-amt { color: #4ade80; }
        .note-100 .denom-pill { background: linear-gradient(160deg,#00234a,#004b90); }
        .note-100 .amount,.note-100 .rupee,.note-100 .row-amt { color: #60a5fa; }
        .note-50 .denom-pill { background: linear-gradient(160deg,#3a1b00,#7a3800); }
        .note-50 .amount,.note-50 .rupee,.note-50 .row-amt { color: #fb923c; }
        .note-20 .denom-pill { background: linear-gradient(160deg,#420e0e,#8b2020); }
        .note-20 .amount,.note-20 .rupee,.note-20 .row-amt { color: #f87171; }
        .note-10 .denom-pill { background: linear-gradient(160deg,#0f2a0f,#2a5e2a); }
        .note-10 .amount,.note-10 .rupee,.note-10 .row-amt { color: #86efac; }
        .coin-5 .denom-pill { background: linear-gradient(160deg,#2a2a2a,#555); }
        .coin-5 .amount,.coin-5 .rupee,.coin-5 .row-amt { color: #d4d4d4; }
        .coin-2 .denom-pill { background: linear-gradient(160deg,#2e2200,#6b5200); }
        .coin-2 .amount,.coin-2 .rupee,.coin-2 .row-amt { color: #fcd34d; }
        .coin-1 .denom-pill { background: linear-gradient(160deg,#1c1c1c,#444); }
        .coin-1 .amount,.coin-1 .rupee,.coin-1 .row-amt { color: #c0c0c0; }

        @media (max-width: 1023px) {
            .mobile-save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(9,9,11,0.95); backdrop-filter: blur(16px); border-top: 1px solid var(--border); padding: 12px 16px; z-index: 50; display: flex; gap: 10px; }
            body { padding-bottom: 80px; }
        }
        @media (min-width: 1024px) { .mobile-save-bar { display: none; } }
    </style>
</head>
<body>

<header class="topbar px-4 py-3">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">
                <i class="fa-solid fa-indian-rupee-sign text-white text-sm"></i>
            </div>
            <span class="font-bold text-base tracking-tight">Denominations</span>
        </div>
        <div class="flex items-center gap-1">
            <button onclick="toggleCalculator()" title="Calculator" class="w-9 h-9 rounded-lg flex items-center justify-center text-zinc-400 hover:text-white transition-all">
                <i class="fa-solid fa-calculator"></i>
            </button>
            <a href="denominationsreport.html" title="Report" class="w-9 h-9 rounded-lg flex items-center justify-center text-zinc-400 hover:text-white transition-all">
                <i class="fa-solid fa-chart-pie"></i>
            </a>
            <a href="../index.html" title="Home" class="w-9 h-9 rounded-lg flex items-center justify-center text-zinc-400 hover:text-white transition-all">
                <i class="fa-solid fa-house"></i>
            </a>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col lg:flex-row gap-6">

        <div class="flex-1 space-y-3">
            <div class="section-divider"><span>Notes</span></div>
            <div id="notes-container" class="space-y-2"></div>
            <div class="section-divider mt-4"><span>Coins</span></div>
            <div id="coins-container" class="space-y-2"></div>
        </div>

        <div class="lg:w-80 space-y-4 lg:sticky lg:top-20 h-min">

            <div class="card total-glow p-5">
                <div class="flex items-center justify-center gap-2 mb-5">
                    <button id="prev-day" class="nav-btn"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <input type="date" id="date-input" />
                    <button id="next-day" class="nav-btn"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
                <div class="text-center space-y-2">
                    <p class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">Total Amount</p>
                    <div id="grand-total">&#8377;0</div>
                    <div id="total-in-words" class="text-xs leading-snug capitalize px-2" style="color:var(--muted);min-height:32px">Zero Rupees Only</div>
                </div>
                <div class="mt-4 pt-4 border-t" style="border-color:var(--border)">
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="card-inner p-2">
                            <div class="text-xs font-semibold mb-1" style="color:var(--muted)">Notes</div>
                            <div id="notes-total" class="text-sm font-bold" style="color:var(--accent-lt)">&#8377;0</div>
                        </div>
                        <div class="card-inner p-2">
                            <div class="text-xs font-semibold mb-1" style="color:var(--muted)">Coins</div>
                            <div id="coins-total" class="text-sm font-bold" style="color:#fbbf24">&#8377;0</div>
                        </div>
                        <div class="card-inner p-2">
                            <div class="text-xs font-semibold mb-1" style="color:var(--muted)">A/C Paid</div>
                            <div id="ac-paid-pill" class="text-sm font-bold" style="color:var(--green)">&#8377;0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-5">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-pen-to-square text-xs" style="color:var(--accent-lt)"></i>
                    <span class="text-sm font-bold">Additional Details</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="field-wrap">
                        <label class="field-label">Week Expenses</label>
                        <input type="number" id="week-expenses-input" placeholder="0.00" class="field-input" />
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">Adjust Amount</label>
                        <input type="number" id="adjust-amount-input" placeholder="0.00" class="field-input" />
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">ATM Withdrawal</label>
                        <input type="number" id="atm-withdrawal-input" placeholder="0.00" inputmode="numeric" class="field-input" />
                    </div>
                    <div class="field-wrap">
                        <label class="field-label">A/C Paid</label>
                        <input type="number" id="ac-paid-input" placeholder="0.00" class="field-input" readonly />
                    </div>
                    <div class="field-wrap col-span-2">
                        <label class="field-label">Remarks</label>
                        <textarea id="remarks-input" placeholder="Enter remarks..." class="field-input" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <div class="hidden lg:flex flex-col gap-3">
                <button onclick="saveData()" id="save-btn" class="btn-save">
                    <i class="fa-solid fa-floppy-disk"></i> Save
                </button>
                <button onclick="clearAll()" class="btn-clear">
                    <i class="fa-solid fa-trash-can"></i> Clear
                </button>
            </div>
        </div>
    </div>
</main>

<div class="mobile-save-bar">
    <button onclick="clearAll()" class="btn-clear" style="flex:0 0 auto;width:auto;padding:12px 20px">
        <i class="fa-solid fa-trash-can"></i>
    </button>
    <button onclick="saveData()" id="save-btn-mobile" class="btn-save">
        <i class="fa-solid fa-floppy-disk"></i> Save
    </button>
</div>

<div id="loader" class="hidden">
    <div class="loader-box">
        <div class="spin" style="font-size:2rem;color:var(--accent-lt)"><i class="fa-solid fa-circle-notch"></i></div>
        <p class="text-sm font-semibold" style="color:var(--muted)">Processing...</p>
    </div>
</div>

<div id="custom-popup" class="popup-overlay">
    <div class="popup-box">
        <div id="popup-icon-container" class="popup-icon-wrap"></div>
        <h3 id="popup-title" class="text-lg font-bold mb-2"></h3>
        <p id="popup-message" class="text-sm mb-5" style="color:var(--muted)"></p>
        <button onclick="closePopup()" class="popup-ok">OK</button>
    </div>
</div>

<div id="calculator-modal" class="hidden" tabindex="-1">
    <div class="calc-box">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-calculator" style="color:var(--accent-lt)"></i>
                <span class="font-bold text-sm">Calculator</span>
            </div>
            <button onclick="toggleCalculator()" class="w-7 h-7 rounded-md flex items-center justify-center text-zinc-500 hover:text-red-400 transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="calc-screen">
            <div id="calc-history"></div>
            <div id="calc-display">0</div>
        </div>
        <div class="calc-grid">
            <button class="calc-btn ac span2" onclick="calcClear()">AC</button>
            <button class="calc-btn del" onclick="calcDelete()"><i class="fa-solid fa-delete-left"></i></button>
            <button class="calc-btn op" onclick="calcAppend('/')">&#247;</button>
            <button class="calc-btn" onclick="calcAppend('7')">7</button>
            <button class="calc-btn" onclick="calcAppend('8')">8</button>
            <button class="calc-btn" onclick="calcAppend('9')">9</button>
            <button class="calc-btn op" onclick="calcAppend('*')">&#215;</button>
            <button class="calc-btn" onclick="calcAppend('4')">4</button>
            <button class="calc-btn" onclick="calcAppend('5')">5</button>
            <button class="calc-btn" onclick="calcAppend('6')">6</button>
            <button class="calc-btn op" onclick="calcAppend('-')">&#8722;</button>
            <button class="calc-btn" onclick="calcAppend('1')">1</button>
            <button class="calc-btn" onclick="calcAppend('2')">2</button>
            <button class="calc-btn" onclick="calcAppend('3')">3</button>
            <button class="calc-btn op" onclick="calcAppend('+')">+</button>
            <button class="calc-btn span2" onclick="calcAppend('0')">0</button>
            <button class="calc-btn" onclick="calcAppend('.')">.</button>
            <button class="calc-btn eq" onclick="calcResult()">=</button>
        </div>
    </div>
</div>

<footer><p>&copy; 2024 <b>Thammineni Technologies</b>. All rights reserved.</p></footer>

<script>
    var NOTES = [500, 200, 100, 50, 20, 10];
    var COINS = [5, 2, 1];
    var ALL   = NOTES.concat(COINS);
    var editingRowIndex = null;

    var noteClass = { 500:'note-500', 200:'note-200', 100:'note-100', 50:'note-50', 20:'note-20', 10:'note-10' };
    var coinClass = { 5:'coin-5', 2:'coin-2', 1:'coin-1' };

    function buildRow(val, type) {
        var cls = type === 'note' ? noteClass[val] : coinClass[val];
        var row = document.createElement('div');
        row.className = 'denom-row ' + cls;
        row.dataset.val = val;
        row.innerHTML =
            '<div class="denom-pill">' +
                '<span class="rupee">&#8377;</span>' +
                '<span class="amount">' + val + '</span>' +
                '<span class="kind">' + type + '</span>' +
            '</div>' +
            '<div class="denom-mid">' +
                '<span class="denom-lbl">Count</span>' +
                '<div class="stepper-wrap">' +
                    '<button class="stp-btn dec-btn" type="button" tabindex="-1">&#8722;</button>' +
                    '<input type="number" class="count-input" min="0" inputmode="numeric" placeholder="0" data-value="' + val + '" id="denom-input-' + val + '">' +
                    '<button class="stp-btn inc-btn" type="button" tabindex="-1">+</button>' +
                '</div>' +
            '</div>' +
            '<div class="denom-total">' +
                '<span class="row-lbl">Total</span>' +
                '<span class="row-amt" style="opacity:.3">&#8377;0</span>' +
            '</div>';

        var input   = row.querySelector('.count-input');
        var totalEl = row.querySelector('.row-amt');

        function update() {
            var c = parseInt(input.value) || 0;
            var t = c * val;
            totalEl.textContent = '\u20B9' + t.toLocaleString('en-IN');
            totalEl.style.opacity = c > 0 ? '1' : '0.3';
            row.classList.toggle('has-value', c > 0);
            input.classList.toggle('active', c > 0);
            calculate();
        }

        input.addEventListener('input', update);
        row.querySelector('.dec-btn').addEventListener('click', function() {
            var v = parseInt(input.value) || 0;
            if (v > 0) { input.value = v - 1; update(); }
        });
        row.querySelector('.inc-btn').addEventListener('click', function() {
            input.value = (parseInt(input.value) || 0) + 1; update();
        });

        return row;
    }

    function renderDenominations() {
        var nc = document.getElementById('notes-container');
        var cc = document.getElementById('coins-container');
        NOTES.forEach(function(v) { nc.appendChild(buildRow(v, 'note')); });
        COINS.forEach(function(v) { cc.appendChild(buildRow(v, 'coin')); });
    }

    function calculate() {
        var notesTotal = 0, coinsTotal = 0;
        NOTES.forEach(function(v) {
            var el = document.getElementById('denom-input-' + v);
            notesTotal += (parseInt(el ? el.value : 0) || 0) * v;
        });
        COINS.forEach(function(v) {
            var el = document.getElementById('denom-input-' + v);
            coinsTotal += (parseInt(el ? el.value : 0) || 0) * v;
        });
        var grandTotal = notesTotal + coinsTotal;

        var el   = document.getElementById('grand-total');
        var prev = parseInt(el.dataset.raw || 0);
        el.dataset.raw = grandTotal;
        if (prev !== grandTotal) animateValue(el, prev, grandTotal, 280);

        document.getElementById('notes-total').textContent = '\u20B9' + notesTotal.toLocaleString('en-IN');
        document.getElementById('coins-total').textContent = '\u20B9' + coinsTotal.toLocaleString('en-IN');
        document.getElementById('total-in-words').textContent = numberToWords(grandTotal);

        var weekExp = parseFloat(document.getElementById('week-expenses-input').value) || 0;
        var adjAmt  = parseFloat(document.getElementById('adjust-amount-input').value) || 0;
        var acPaid  = (grandTotal + adjAmt) - weekExp;
        document.getElementById('ac-paid-input').value = acPaid.toFixed(2);
        document.getElementById('ac-paid-pill').textContent = '\u20B9' + acPaid.toLocaleString('en-IN');
    }

    function animateValue(el, from, to, dur) {
        var start = null;
        function step(ts) {
            if (!start) start = ts;
            var p = Math.min((ts - start) / dur, 1);
            el.textContent = '\u20B9' + Math.floor(p * (to - from) + from).toLocaleString('en-IN');
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = '\u20B9' + to.toLocaleString('en-IN');
        }
        requestAnimationFrame(step);
    }

    function initDate() {
        var inp = document.getElementById('date-input');
        inp.value = new Date().toISOString().split('T')[0];
        inp.max   = inp.value;
        document.getElementById('prev-day').addEventListener('click', function() { shiftDate(-1); });
        document.getElementById('next-day').addEventListener('click', function() { shiftDate(1); });
    }

    function shiftDate(d) {
        var inp = document.getElementById('date-input');
        if (!inp.value) return;
        var dt = new Date(inp.value);
        dt.setDate(dt.getDate() + d);
        var today = new Date(); today.setHours(0,0,0,0);
        if (dt <= today) inp.value = dt.toISOString().split('T')[0];
    }

    function formatDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        if (isNaN(d)) return iso;
        var day = String(d.getDate()).padStart(2, '0');
        var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return day + '/' + mon[d.getMonth()] + '/' + d.getFullYear();
    }

    function numberToWords(num) {
        if (num === 0) return 'Zero Rupees Only';
        var a = ['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
        var b = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
        function fmt(n, sfx) {
            if (!n) return '';
            var s = n > 19 ? b[Math.floor(n/10)] + (n%10 ? ' '+a[n%10] : '') : a[n];
            return s ? s + sfx : '';
        }
        var r = '';
        r += fmt(Math.floor(num/10000000), ' Crore ');
        r += fmt(Math.floor((num/100000)%100), ' Lakh ');
        r += fmt(Math.floor((num/1000)%100), ' Thousand ');
        r += fmt(Math.floor((num/100)%10), ' Hundred ');
        if (num > 100 && num % 100) r += 'and ';
        r += fmt(num%100, '');
        return r.trim().replace(/\s+/g,' ') + ' Rupees Only';
    }

    function clearAll() {
        document.querySelectorAll('.count-input').forEach(function(i) {
            i.value = ''; i.classList.remove('active');
        });
        document.querySelectorAll('.denom-row').forEach(function(r) {
            r.classList.remove('has-value');
            r.querySelector('.row-amt').style.opacity = '0.3';
            r.querySelector('.row-amt').textContent = '\u20B90';
        });
        ['week-expenses-input','adjust-amount-input','atm-withdrawal-input','ac-paid-input','remarks-input'].forEach(function(id) {
            document.getElementById(id).value = '';
        });
        document.getElementById('ac-paid-pill').textContent = '\u20B90';
        editingRowIndex = null;
        calculate();
    }

    function populateData(data) {
        if (data.Date) {
            var dt = new Date(data.Date);
            if (!isNaN(dt)) {
                var adj = new Date(dt.getTime() - dt.getTimezoneOffset()*60000);
                document.getElementById('date-input').value = adj.toISOString().split('T')[0];
            }
        }
        ALL.forEach(function(d) {
            var v = data[d.toString()];
            if (v !== undefined && v !== null) {
                var inp = document.getElementById('denom-input-' + d);
                if (inp) { inp.value = v; inp.dispatchEvent(new Event('input')); }
            }
        });
        if (data['Week Expenses'])  document.getElementById('week-expenses-input').value  = data['Week Expenses'];
        if (data['Adjust Amount'])  document.getElementById('adjust-amount-input').value  = data['Adjust Amount'];
        if (data['ATM Withdrawal']) document.getElementById('atm-withdrawal-input').value = data['ATM Withdrawal'];
        if (data['Remarks'])        document.getElementById('remarks-input').value        = data['Remarks'];
        calculate();
    }

    function showPopup(title, msg, type) {
        type = type || 'success';
        var popup = document.getElementById('custom-popup');
        document.getElementById('popup-title').textContent   = title;
        document.getElementById('popup-message').textContent = msg;
        popup.classList.remove('popup-success','popup-error');
        popup.classList.add(type === 'success' ? 'popup-success' : 'popup-error');
        document.getElementById('popup-icon-container').innerHTML =
            type === 'success' ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
        popup.classList.add('active');
    }

    function closePopup() {
        document.getElementById('custom-popup').classList.remove('active');
        if (window.pendingRedirect) { window.location.href = window.pendingRedirect; window.pendingRedirect = null; }
        if (window.pendingClear)    { editingRowIndex = null; clearAll(); window.pendingClear = false; }
    }

    function saveData() {
        var loader   = document.getElementById('loader');
        var saveBtn  = document.getElementById('save-btn');
        var saveBtnM = document.getElementById('save-btn-mobile');
        loader.classList.remove('hidden');
        saveBtn.disabled = true;
        if (saveBtnM) saveBtnM.disabled = true;

        var dateInput     = document.getElementById('date-input');
        var grandTotalRaw = parseInt(document.getElementById('grand-total').textContent.replace(/[^0-9]/g,'')) || 0;
        var denomMap = {'500':'d500','200':'d200','100':'d100','50':'d50','20':'d20','10':'d10','5':'d5','2':'d2','1':'d1'};
        var data = {
            date:          formatDate(dateInput.value),
            weekExpenses:  parseFloat(document.getElementById('week-expenses-input').value)  || 0,
            adjustAmount:  parseFloat(document.getElementById('adjust-amount-input').value)  || 0,
            atmWithdrawal: parseFloat(document.getElementById('atm-withdrawal-input').value) || 0,
            acPaid:        parseFloat(document.getElementById('ac-paid-input').value)        || 0,
            remarks:       document.getElementById('remarks-input').value,
            d500:0,d200:0,d100:0,d50:0,d20:0,d10:0,d5:0,d2:0,d1:0,
            total: grandTotalRaw
        };
        document.querySelectorAll('.count-input').forEach(function(inp) {
            var key = denomMap[inp.dataset.value];
            if (key) data[key] = parseInt(inp.value) || 0;
        });

        var isUpdate = false;
        if (editingRowIndex !== null) {
            data.action   = 'update';
            data.rowIndex = editingRowIndex;
            data.date     = dateInput.value;
            isUpdate      = true;
        }

        fetch(CONFIG.GOOGLE_SHEET_URL_DENOMINATIONS, { method:'POST', body:JSON.stringify(data), mode:'no-cors' })
        .then(function() {
            loader.classList.add('hidden');
            saveBtn.disabled = false;
            if (saveBtnM) saveBtnM.disabled = false;
            localStorage.setItem('cashCounterData', JSON.stringify(data));
            if (isUpdate) { window.pendingRedirect = 'denominationsreport.html'; showPopup('Success','Data updated successfully','success'); }
            else          { window.pendingClear = true; showPopup('Success','Data saved successfully','success'); }
        })
        .catch(function(err) {
            loader.classList.add('hidden');
            saveBtn.disabled = false;
            if (saveBtnM) saveBtnM.disabled = false;
            showPopup('Error','Error sending data: ' + err.message,'error');
        });
    }

    /* ── Calculator ─── */
    var calcExpr = '';
    function toggleCalculator() { document.getElementById('calculator-modal').classList.toggle('hidden'); }
    function updateCalcUI() {
        var ops = ['+','-','*','/'], si = -1;
        for (var i = calcExpr.length-1; i >= 0; i--) { if (ops.indexOf(calcExpr[i]) !== -1) { si = i; break; } }
        if (si !== -1) {
            document.getElementById('calc-history').textContent = calcExpr.substring(0, si+1);
            document.getElementById('calc-display').textContent = calcExpr.substring(si+1) || '0';
        } else {
            document.getElementById('calc-history').textContent = '';
            document.getElementById('calc-display').textContent = calcExpr || '0';
        }
    }
    function calcAppend(v) { if (!calcExpr && ['/','*','+'].indexOf(v) !== -1) return; calcExpr += v; updateCalcUI(); }
    function calcClear()  { calcExpr = ''; document.getElementById('calc-history').textContent = ''; document.getElementById('calc-display').textContent = '0'; }
    function calcDelete() { calcExpr = calcExpr.slice(0,-1); updateCalcUI(); }
    function calcResult() {
        try {
            if (!calcExpr) return;
            var expr = calcExpr;
            while (expr && ['+','-','*','/'].indexOf(expr.slice(-1)) !== -1) expr = expr.slice(0,-1);
            if (!expr) return;
            var res = eval(expr);
            document.getElementById('calc-history').textContent = expr + ' =';
            document.getElementById('calc-display').textContent = res;
            calcExpr = String(res);
        } catch(e) { document.getElementById('calc-display').textContent = 'Error'; calcExpr = ''; }
    }
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('calculator-modal').classList.contains('hidden')) return;
        if (/[0-9]/.test(e.key)) calcAppend(e.key);
        else if (['+','-','*','/','.']. indexOf(e.key) !== -1) calcAppend(e.key);
        else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calcResult(); }
        else if (e.key === 'Backspace') calcDelete();
        else if (e.key === 'Escape')   toggleCalculator();
        else if (e.key.toLowerCase() === 'c') calcClear();
    });

    function init() {
        initDate();
        renderDenominations();
        ['week-expenses-input','adjust-amount-input','atm-withdrawal-input'].forEach(function(id) {
            document.getElementById(id).addEventListener('input', calculate);
        });
        var edit = localStorage.getItem('editReportData');
        if (edit) {
            var d = JSON.parse(edit);
            populateData(d);
            editingRowIndex = d.rowIndex !== undefined ? d.rowIndex : null;
            localStorage.removeItem('editReportData');
        }
        calculate();
    }

    init();
</script>
</body>
