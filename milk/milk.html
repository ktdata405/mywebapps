<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../root/logo.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#030305">

    <title data-translate-key="milkBillTitle">Milk Bill - KT Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../config.js"></script>

    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: #151a25;
            --primary: #6366f1;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-panel {
            background: rgba(21, 26, 37, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Date Accordion Styles from cashew.html */
        .accordion-container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .calendar-wrapper {
            padding: 0.75rem;
            max-width: 300px;
            margin: 0 auto;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 0.25rem;
        }
        .calendar-header span {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .date-cell {
            aspect-ratio: 1;
            position: relative;
        }
        .date-cell input { display: none; }
        .date-cell label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }

        .date-cell.has-data label {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .date-cell input:checked + label {
            background: #6366f1 !important;
            color: white !important;
            border-color: #6366f1 !important;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transform: scale(1.05);
            z-index: 2;
        }

        /* Popup Styles from denominations.html */
        .popup-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:9998;opacity:0;visibility:hidden;transition:opacity 0.25s,visibility 0.25s; }
        .popup-overlay.active { opacity:1;visibility:visible; }
        .popup-box { background:rgba(15,20,35,0.95);backdrop-filter:blur(20px);border: 1px solid rgba(255, 255, 255, 0.08);border-radius:22px;padding:36px;max-width:380px;width:90%;text-align:center;transform:scale(0.88);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); color: white; }
        .popup-overlay.active .popup-box { transform:scale(1); }
        .popup-icon-wrap { width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 18px; }
        .popup-success .popup-icon-wrap { background:rgba(34,197,94,0.12);color:#22c55e; }
        .popup-error   .popup-icon-wrap { background:rgba(239,68,68,0.12);color:#f87171; }
        .popup-ok { background:rgba(255,255,255,0.07);border: 1px solid rgba(255, 255, 255, 0.08);color:#f1f5f9;padding:10px 36px;border-radius:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;transition:background 0.15s;margin-top:6px; }
        .popup-ok:hover { background:rgba(255,255,255,0.12); }
    </style>
</head>

<body class="min-h-screen pb-40 relative overflow-x-hidden">
    <!-- Background Gradients -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/20 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-30 glass-panel border-b border-white/5 px-6 py-4 mb-8 backdrop-blur-xl bg-[#0b0f19]/80">
        <div class="max-w-3xl lg:max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 ring-4 ring-white/5">
                    <i class="fa-solid fa-cow text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white leading-tight" data-translate-key="milkBill">Milk Bill</h1>
                    <p class="text-xs text-gray-400 font-medium">Daily Tracker</p>
                </div>
            </div>
            <div class="flex gap-3">
                <a href="milkreport.html" class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 flex items-center justify-center transition-all text-gray-400 hover:text-white" title="Report">
                    <i class="fa-solid fa-chart-pie"></i>
                </a>
                <a href="../index.html" class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 flex items-center justify-center transition-all text-gray-400 hover:text-white" title="Home">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 lg:max-w-7xl lg:px-8">
        <div class="lg:grid lg:grid-cols-12 lg:gap-8 items-start">
            <!-- Left Sidebar -->
            <div class="lg:col-span-4 lg:sticky lg:top-28 space-y-6 mb-8 lg:mb-0">
                <!-- Date Input -->
                <div class="glass-panel rounded-3xl p-6 shadow-2xl border border-white/10">
                    <label class="text-[10px] uppercase tracking-wider text-gray-500 font-bold ml-1 mb-2 block" data-translate-key="date">Date</label>
                    <div class="flex items-center gap-3">
                        <button onclick="changeDate(-1)" class="w-12 h-12 rounded-2xl bg-black/40 border border-white/10 text-gray-400 hover:text-white flex items-center justify-center transition-all active:scale-95 hover:bg-white/5">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <input type="date" id="date-input" class="flex-1 bg-black/40 border border-white/10 rounded-2xl px-4 py-3.5 text-white font-bold outline-none focus:border-indigo-500 transition-all" />
                        <button onclick="changeDate(1)" class="w-12 h-12 rounded-2xl bg-black/40 border border-white/10 text-gray-400 hover:text-white flex items-center justify-center transition-all active:scale-95 hover:bg-white/5">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Date Selection Accordion -->
                <div class="accordion-container">
                    <button type="button" onclick="toggleDateAccordion()" class="w-full p-4 flex justify-between items-center bg-transparent border-none text-white cursor-pointer hover:bg-white/5 transition-colors lg:hidden">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                                <i class="fa-regular fa-calendar-days text-sm"></i>
                            </div>
                            <span class="font-bold text-xs uppercase tracking-wider" id="accordion-month-label">Month Overview</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform duration-300" id="date-accordion-arrow"></i>
                    </button>
                    <div id="date-accordion-content" class="hidden lg:block border-t border-white/5 lg:border-t-0">
                        <div id="date-radio-grid" class="calendar-wrapper">
                            <!-- Radio buttons generated here -->
                        </div>
                        <div class="pb-4 flex items-center gap-4 text-[9px] font-bold text-gray-500 uppercase tracking-widest justify-center">
                            <div class="flex items-center gap-1.5">
                                <span class="w-3 h-3 rounded bg-emerald-500/20 border border-emerald-500/40"></span> Data
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span class="w-3 h-3 rounded bg-white/5 border border-white/10"></span> Empty
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Content -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Collection Inputs -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-panel rounded-3xl p-6 border border-white/10">
                        <label class="text-[10px] uppercase tracking-wider text-gray-500 font-bold ml-1 mb-2 block" data-translate-key="morningCollection">Morning Collection (Liters)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-indigo-400">
                                <i class="fa-solid fa-sun text-sm"></i>
                            </div>
                            <input type="number" step="0.1" id="morning-input" placeholder="1.5" oninput="calculateDaily()" class="w-full bg-black/40 border border-white/10 rounded-2xl pl-10 pr-4 py-3.5 text-white font-mono text-lg font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                    </div>

                    <div class="glass-panel rounded-3xl p-6 border border-white/10">
                        <label class="text-[10px] uppercase tracking-wider text-gray-500 font-bold ml-1 mb-2 block" data-translate-key="eveningCollection">Evening Collection (Liters)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-indigo-400">
                                <i class="fa-solid fa-moon text-sm"></i>
                            </div>
                            <input type="number" step="0.1" id="evening-input" placeholder="0.5" oninput="calculateDaily()" class="w-full bg-black/40 border border-white/10 rounded-2xl pl-10 pr-4 py-3.5 text-white font-mono text-lg font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                    </div>
                </div>

                <!-- Totals Card -->
                <div class="glass-panel rounded-3xl p-6 border border-indigo-500/30 bg-indigo-500/5">
                    <div class="grid grid-cols-3 gap-4 text-center">
                        <div>
                            <p class="text-[10px] uppercase tracking-wider text-gray-500 font-bold mb-1" data-translate-key="dailyTotal">Daily Total</p>
                            <p id="daily-total" class="text-xl font-black text-white font-mono">2.0 L</p>
                        </div>
                        <div>
                            <p class="text-[10px] uppercase tracking-wider text-gray-500 font-bold mb-1" data-translate-key="unitPrice">Unit Price</p>
                            <p class="text-xl font-black text-white font-mono">₹80</p>
                        </div>
                        <div>
                            <p class="text-[10px] uppercase tracking-wider text-gray-500 font-bold mb-1" data-translate-key="dailyCost">Daily Cost</p>
                            <p id="daily-cost" class="text-xl font-black text-emerald-400 font-mono">₹160.00</p>
                        </div>
                    </div>
                </div>

                <!-- Remarks Input -->
                <div class="glass-panel rounded-3xl p-6 border border-white/10">
                    <label class="text-[10px] uppercase tracking-wider text-gray-500 font-bold ml-1 mb-2 block">Remarks / Address</label>
                    <div class="relative">
                        <div class="absolute top-4 left-4 pointer-events-none text-indigo-400">
                            <i class="fa-solid fa-comment-dots text-sm"></i>
                        </div>
                        <textarea id="remarks-input" placeholder="Enter remarks..." class="w-full bg-black/40 border border-white/10 rounded-2xl pl-10 pr-4 py-3.5 text-white font-medium outline-none focus:border-indigo-500 transition-all resize-none h-[100px]" rows="3"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 left-0 w-full glass-panel border-t border-white/10 z-40 pb-safe bg-[#0b0f19]/90 backdrop-blur-xl">
        <div class="max-w-3xl lg:max-w-7xl mx-auto px-6 py-4 flex items-center justify-end gap-3">
            <button onclick="clearInputs()" class="w-12 h-12 rounded-2xl bg-white/5 hover:bg-red-500/10 border border-white/5 text-gray-400 hover:text-red-400 flex items-center justify-center transition-all active:scale-95">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <button onclick="saveMilkData()" id="save-btn" class="h-12 px-8 rounded-2xl bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white font-bold shadow-lg flex items-center gap-2.5 transition-all active:scale-95">
                <i class="fa-solid fa-check"></i>
                <span data-translate-key="save">Save</span>
            </button>
        </div>
    </div>

    <div id="loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin">
                <i class="fa-solid fa-circle-notch text-5xl text-indigo-400"></i>
            </div>
            <p id="loader-text" class="text-white font-medium">Saving...</p>
        </div>
    </div>

    <!-- Success/Error Popup -->
    <div id="custom-popup" class="popup-overlay">
        <div class="popup-box">
            <div id="popup-icon-container" class="popup-icon-wrap"></div>
            <h3 id="popup-title" class="text-lg font-bold mb-2"></h3>
            <p id="popup-message" class="text-sm mb-5 text-gray-400"></p>
            <button onclick="closePopup()" class="popup-ok">OK</button>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../localization.js"></script>
    <script>
        // ── Service Worker ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .catch(e => console.log('SW failed:', e));
            });
        }

        const UNIT_PRICE = 80;

        function changeDate(offset) {
            const dateInput = document.getElementById('date-input');
            const currentDate = new Date(dateInput.value);
            if (!isNaN(currentDate.getTime())) {
                currentDate.setDate(currentDate.getDate() + offset);
                const newDate = currentDate.toISOString().split('T')[0];
                dateInput.value = newDate;
                initDateAccordion(newDate);
            }
        }

        function init() {
            const dateInput = document.getElementById('date-input');
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;

            // Default values
            document.getElementById('morning-input').value = 1.5;
            document.getElementById('evening-input').value = 0.5;

            // Check for edit data
            const editData = localStorage.getItem('milkEditData');
            if (editData) {
                const data = JSON.parse(editData);
                localStorage.removeItem('milkEditData');

                // Parse date string like "01 Jan 2024" to "YYYY-MM-DD"
                const dateParts = data.date.split(' ');
                if (dateParts.length === 3) {
                    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    const m = String(months.indexOf(dateParts[1]) + 1).padStart(2, '0');
                    dateInput.value = `${dateParts[2]}-${m}-${dateParts[0].padStart(2, '0')}`;
                } else {
                    dateInput.value = new Date(data.date).toISOString().split('T')[0];
                }

                document.getElementById('morning-input').value = data.morning;
                document.getElementById('evening-input').value = data.evening;
                document.getElementById('remarks-input').value = data.remarks || '';
            }

            calculateDaily();
            initDateAccordion(dateInput.value);

            dateInput.addEventListener('change', () => {
                initDateAccordion(dateInput.value);
            });
        }

        function calculateDaily() {
            const morning = parseFloat(document.getElementById('morning-input').value) || 0;
            const evening = parseFloat(document.getElementById('evening-input').value) || 0;
            const total = morning + evening;
            const cost = total * UNIT_PRICE;

            document.getElementById('daily-total').textContent = `${total.toFixed(1)} L`;
            document.getElementById('daily-cost').textContent = `₹${cost.toFixed(2)}`;
        }

        function clearInputs() {
            document.getElementById('morning-input').value = '1.5';
            document.getElementById('evening-input').value = '0.5';
            document.getElementById('remarks-input').value = '';
            calculateDaily();
        }

        function showPopup(title, msg, type = 'success') {
            const popup = document.getElementById('custom-popup');
            document.getElementById('popup-title').textContent = title;
            document.getElementById('popup-message').textContent = msg;
            popup.classList.remove('popup-success', 'popup-error');
            popup.classList.add(type === 'success' ? 'popup-success' : 'popup-error');
            document.getElementById('popup-icon-container').innerHTML =
                type === 'success' ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
            popup.classList.add('active');
        }

        function closePopup() {
            document.getElementById('custom-popup').classList.remove('active');
        }

        function saveMilkData() {
            const date = document.getElementById('date-input').value;
            const morning = parseFloat(document.getElementById('morning-input').value) || 0;
            const evening = parseFloat(document.getElementById('evening-input').value) || 0;
            const remarks = document.getElementById('remarks-input').value;

            if (!date) {
                showPopup('Error', 'Please select a date', 'error');
                return;
            }

            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const payload = {
                type: 'milk',
                action: 'add',
                date: date,
                morning: morning,
                evening: evening,
                unitPrice: UNIT_PRICE,
                remarks: remarks
            };

            fetch("https://script.google.com/macros/s/AKfycbziPFlV_L7fA99c-vrT027tHnc_a-mu_paFhTZWFbZYvN6g0GBmdP7uisivPXNY86bt8g/exec", {
                method: 'POST',
                body: JSON.stringify(payload),
                mode: 'no-cors'
            })
            .then(() => {
                loader.classList.add('hidden');
                showPopup('Success', 'Data saved successfully!', 'success');
                clearInputs();
                // Refresh calendar
                initDateAccordion(date);
                // Move to next day
                const d = new Date(date);
                d.setDate(d.getDate() + 1);
                const nextDay = d.toISOString().split('T')[0];
                document.getElementById('date-input').value = nextDay;
                initDateAccordion(nextDay);
            })
            .catch(error => {
                loader.classList.add('hidden');
                console.error('Error:', error);
                showPopup('Error', 'Error saving data', 'error');
            });
        }

        // --- Date Accordion Logic ---
        function toggleDateAccordion() {
            const content = document.getElementById('date-accordion-content');
            const arrow = document.getElementById('date-accordion-arrow');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                arrow.classList.remove('rotate-180');
            }
        }

        async function initDateAccordion(selectedDateStr) {
            let dateObj = new Date(selectedDateStr);
            if (isNaN(dateObj)) dateObj = new Date();

            const monthIndex = dateObj.getMonth();
            const year = dateObj.getFullYear();
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const sheetName = `${months[monthIndex]} ${year}`;

            const label = document.getElementById('accordion-month-label');
            if(label) label.textContent = sheetName;

            let existingDates = [];
            try {
                const response = await fetch(`https://script.google.com/macros/s/AKfycbxySvwYRG1G1uH8PBMNnUHaY8LIK8qoSqvjssVBOMAjos-nIu-JUUULaAZvPDJY1yXYbA/exec?sheetName=${encodeURIComponent(sheetName)}&datesOnly=true`);
                const result = await response.json();
                if (result.dates) {
                    existingDates = result.dates;
                }
            } catch (e) {
                console.error("Failed to fetch existing dates for accordion", e);
            }

            renderDateRadios(year, monthIndex, existingDates, dateObj.getDate());
        }

        function renderDateRadios(year, monthIndex, existingDates, selectedDay) {
            const firstDay = new Date(year, monthIndex, 1).getDay();
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
            const container = document.getElementById('date-radio-grid');
            container.innerHTML = '';

            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const monthName = months[monthIndex];

            const headerRow = document.createElement('div');
            headerRow.className = 'calendar-header';
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                const span = document.createElement('span');
                span.textContent = day;
                headerRow.appendChild(span);
            });
            container.appendChild(headerRow);

            const grid = document.createElement('div');
            grid.className = 'calendar-grid';

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = String(i).padStart(2, '0');
                const fullDateStr = `${dayStr}/${monthName}/${year}`;
                const hasData = existingDates.includes(fullDateStr);

                const wrapper = document.createElement('div');
                wrapper.className = `date-cell ${hasData ? 'has-data' : ''}`;

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'accordionDate';
                input.id = `date-radio-${i}`;
                if (i === selectedDay) input.checked = true;

                input.onchange = () => {
                    const newDate = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${dayStr}`;
                    document.getElementById('date-input').value = newDate;
                    initDateAccordion(newDate);
                };

                const label = document.createElement('label');
                label.htmlFor = `date-radio-${i}`;
                label.textContent = i;

                wrapper.appendChild(input);
                wrapper.appendChild(label);
                grid.appendChild(wrapper);
            }
            container.appendChild(grid);
        }

        init();
    </script>
</body>

</html>
