<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#030305">
    <title>Scan History - KT Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030305; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .glass-card { background: #151a25; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s ease, border-color 0.2s ease; }

        /* ===== BASE MOBILE RESETS ===== */
        * { -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; box-sizing: border-box; }
        body {
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }
        button, a { touch-action: manipulation; }
        header { padding-top: max(0.75rem, env(safe-area-inset-top)); }
        input[type="text"] { font-size: 16px !important; }
        main.flex-grow { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        #loader { min-height: 60vh; }

        /* Responsive grid */
        @media (max-width: 360px) {
            #scan-grid.grid-view { grid-template-columns: repeat(2, 1fr) !important; gap: 0.375rem !important; }
        }
        @media (max-width: 480px) {
            #scan-grid.grid-view { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        }
        @media (min-width: 481px) and (max-width: 767px) {
            #scan-grid.grid-view { grid-template-columns: repeat(3, 1fr); }
        }

        /* List view */
        #scan-grid.list-view {
            grid-template-columns: 1fr !important;
            gap: 0.5rem !important;
        }
        #scan-grid.list-view .glass-card {
            display: flex;
            flex-direction: row;
            align-items: center;
        }
        #scan-grid.list-view .glass-card .card-thumb {
            width: 72px;
            min-width: 72px;
            height: 56px;
            aspect-ratio: unset !important;
            border-radius: 0.5rem;
            margin: 0.5rem;
            overflow: hidden;
            flex-shrink: 0;
        }
        #scan-grid.list-view .glass-card .card-info {
            flex: 1;
            padding: 0.5rem 0.5rem 0.5rem 0;
        }

        /* Touch card feedback */
        @media (hover: none) {
            .glass-card:hover { transform: none !important; border-color: rgba(255,255,255,0.05) !important; }
            .glass-card:active { transform: scale(0.97) !important; border-color: rgba(99,102,241,0.5) !important; opacity: 0.85; }
        }
        @media (hover: hover) {
            .glass-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-4px); }
        }

        /* Lightbox enhancements */
        #lightbox { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        #close-lightbox { top: max(1rem, env(safe-area-inset-top)) !important; right: max(1rem, env(safe-area-inset-right)) !important; min-width: 48px; min-height: 48px; }
        #lightbox-img { max-height: calc(82vh - env(safe-area-inset-top) - env(safe-area-inset-bottom)); touch-action: pinch-zoom; user-select: none; }
        #lightbox .lbx-actions { bottom: max(1.5rem, env(safe-area-inset-bottom)) !important; }

        /* Swipe-down indicator */
        .lb-swipe-hint {
            position: absolute;
            top: max(0.5rem, calc(env(safe-area-inset-top) + 0.25rem));
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* Pull-to-refresh */
        .ptr-indicator {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 0.5rem);
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 200;
            transition: transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .ptr-indicator.visible { transform: translateX(-50%) translateY(0); }
        .ptr-indicator.refreshing .ptr-icon { animation: ptr-spin 1s linear infinite; }
        @keyframes ptr-spin { to { transform: rotate(360deg); } }

        /* Toast */
        .kt-toast {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc;
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
            max-width: 90vw;
        }
        .kt-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .kt-toast.success { border-color: rgba(99,102,241,0.5); }

        /* View toggle button active */
        .view-btn.active { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); color: #a5b4fc; }

        /* Image loading skeleton */
        .img-skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* Image count badge */
        #img-count-badge {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            color: #a5b4fc;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Header buttons touch targets */
        header a, header button { min-width: 44px; min-height: 44px; }

        /* Lightbox prev/next arrows */
        .lb-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 60;
        }
        .lb-nav-btn:active { background: rgba(255,255,255,0.25); }
        #lb-prev { left: max(0.75rem, env(safe-area-inset-left)); }
        #lb-next { right: max(0.75rem, env(safe-area-inset-right)); }
        @media (max-width: 480px) {
            #lb-prev, #lb-next { display: none; }
        }

        /* Skeleton loader cards */
        .scan-skeleton {
            background: #151a25;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1rem;
            overflow: hidden;
        }
        .scan-skeleton .sk-img { height: 120px; }
        .scan-skeleton .sk-text { height: 10px; margin: 0.75rem; border-radius: 4px; }
        .scan-skeleton .sk-text-sm { height: 8px; margin: 0 0.75rem 0.75rem; width: 60%; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-900/10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[30%] h-[30%] rounded-full bg-purple-900/5 blur-[80px]"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-40 px-3 sm:px-4 py-2.5">
        <div class="glass rounded-2xl px-3 sm:px-4 py-2.5 flex flex-col sm:flex-row justify-between items-center gap-2.5 max-w-7xl mx-auto">
            <div class="flex items-center gap-2.5 w-full sm:w-auto">
                <a href="scan.html" class="w-11 h-11 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white active:text-white transition-colors flex-shrink-0">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="flex items-center gap-2">
                    <h1 class="text-base sm:text-lg font-bold">Scan History</h1>
                    <span id="img-count-badge" class="hidden">0</span>
                </div>
                <!-- View toggle (mobile only) -->
                <div class="ml-auto flex gap-1.5 sm:hidden">
                    <button id="btn-grid-view" class="view-btn active w-9 h-9 rounded-lg glass flex items-center justify-center text-gray-400 transition-colors" title="Grid view">
                        <i class="fa-solid fa-grip text-sm"></i>
                    </button>
                    <button id="btn-list-view" class="view-btn w-9 h-9 rounded-lg glass flex items-center justify-center text-gray-400 transition-colors" title="List view">
                        <i class="fa-solid fa-list text-sm"></i>
                    </button>
                    <a href="../index.html" class="w-9 h-9 rounded-lg glass flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-house text-sm"></i>
                    </a>
                </div>
                <a href="../index.html" class="hidden sm:flex ml-auto sm:ml-0 w-11 h-11 rounded-xl glass items-center justify-center text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>

            <div class="relative w-full sm:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none"></i>
                <input type="text" id="search-input" placeholder="Search documents..."
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-10 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500/50 focus:bg-white/10 transition-all"
                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <button id="clear-search" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors hidden">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-grow p-3 sm:p-4 max-w-7xl mx-auto w-full">
        <!-- Skeleton loading state -->
        <div id="loader" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            <!-- Skeleton cards will be injected by JS -->
        </div>

        <div id="scan-grid" class="grid-view grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-4 hidden">
        </div>

        <div id="no-results" class="hidden text-center py-20">
            <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-magnifying-glass text-gray-500 text-xl"></i>
            </div>
            <p class="text-gray-400">No documents found.</p>
            <button onclick="document.getElementById('search-input').value=''; document.getElementById('search-input').dispatchEvent(new Event('input'));"
                class="mt-4 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-gray-400 hover:text-white transition-colors">
                Clear search
            </button>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/97 backdrop-blur-xl flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="lb-swipe-hint"></div>
        <button id="close-lightbox" class="absolute w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 active:bg-white/30 text-white flex items-center justify-center transition-colors z-50" style="top: max(1rem, env(safe-area-inset-top)); right: max(1rem, env(safe-area-inset-right));">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <!-- Nav arrows (desktop) -->
        <button id="lb-prev" class="lb-nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <button id="lb-next" class="lb-nav-btn"><i class="fa-solid fa-chevron-right"></i></button>

        <img id="lightbox-img" src="" class="max-w-[95%] object-contain rounded-xl shadow-2xl transform scale-95 transition-transform duration-300 select-none" style="max-height: calc(82vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));" alt="Full view" draggable="false">

        <!-- Caption + actions -->
        <div class="lbx-actions absolute flex flex-col items-center gap-2" style="bottom: max(1.5rem, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);">
            <p id="lb-caption" class="text-xs text-gray-400 font-medium max-w-[80vw] text-center truncate"></p>
            <div class="flex gap-3">
                <a id="download-link" href="#" target="_blank" class="px-5 py-2.5 rounded-full bg-white text-black font-bold hover:bg-gray-200 active:bg-gray-300 transition-colors flex items-center gap-2 shadow-lg text-sm">
                    <i class="fa-solid fa-download"></i> Download
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scanGrid    = document.getElementById('scan-grid');
            const loader      = document.getElementById('loader');
            const searchInput = document.getElementById('search-input');
            const clearSearch = document.getElementById('clear-search');
            const noResults   = document.getElementById('no-results');
            const lightbox    = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeLb     = document.getElementById('close-lightbox');
            const downloadLink= document.getElementById('download-link');
            const lbCaption   = document.getElementById('lb-caption');
            const lbPrev      = document.getElementById('lb-prev');
            const lbNext      = document.getElementById('lb-next');
            const badge       = document.getElementById('img-count-badge');
            const btnGrid     = document.getElementById('btn-grid-view');
            const btnList     = document.getElementById('btn-list-view');

            let allScans = [];
            let currentIndex = 0;
            let filteredScans = [];

            // ---- Skeleton loader ----
            function showSkeletons(count = 8) {
                loader.innerHTML = Array.from({length: count}, () => `
                    <div class="scan-skeleton">
                        <div class="sk-img img-skeleton"></div>
                        <div class="sk-text img-skeleton"></div>
                        <div class="sk-text-sm img-skeleton"></div>
                    </div>`).join('');
            }
            showSkeletons();

            // ---- View Toggle ----
            btnGrid.addEventListener('click', () => {
                scanGrid.classList.remove('list-view');
                scanGrid.classList.add('grid-view');
                scanGrid.style.gridTemplateColumns = '';
                btnGrid.classList.add('active'); btnList.classList.remove('active');
                localStorage.setItem('scanView', 'grid');
            });
            btnList.addEventListener('click', () => {
                scanGrid.classList.remove('grid-view');
                scanGrid.classList.add('list-view');
                btnList.classList.add('active'); btnGrid.classList.remove('active');
                localStorage.setItem('scanView', 'list');
            });
            if (localStorage.getItem('scanView') === 'list') btnList.click();

            // ---- Fetch ----
            async function fetchScans() {
                try {
                    const response = await fetch(CONFIG.GOOGLE_SHEET_URL_SCAN);
                    const result = await response.json();
                    if (result.status === 'success') {
                        allScans = result.data;
                        filteredScans = allScans;
                        renderScans(allScans);
                        badge.textContent = allScans.length;
                        badge.classList.remove('hidden');
                    } else {
                        showError(result.message);
                    }
                } catch (e) { showError('Failed to load data.'); }
                finally { loader.classList.add('hidden'); scanGrid.classList.remove('hidden'); }
            }

            function showError(msg) {
                scanGrid.innerHTML = `<div class="col-span-full text-center py-12 text-red-400"><i class="fa-solid fa-triangle-exclamation text-3xl mb-3 block"></i>${msg}</div>`;
                scanGrid.classList.remove('hidden');
            }

            function renderScans(scans) {
                filteredScans = scans;
                scanGrid.innerHTML = '';
                if (scans.length === 0) {
                    scanGrid.classList.add('hidden');
                    noResults.classList.remove('hidden');
                    return;
                }
                scanGrid.classList.remove('hidden');
                noResults.classList.add('hidden');

                scans.forEach((scan, idx) => {
                    const date = new Date(scan.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    let imageUrl = scan.url;
                    if (scan.id) imageUrl = `https://lh3.googleusercontent.com/d/${scan.id}`;

                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl overflow-hidden group transition-all duration-300 cursor-pointer';
                    card.innerHTML = `
                        <div class="card-thumb relative aspect-[4/3] overflow-hidden bg-black/40 img-skeleton">
                            <img src="${imageUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${scan.name}" loading="lazy"
                                onload="this.parentElement.classList.remove('img-skeleton')"
                                onerror="this.src='https://placehold.co/400x300/1e1e1e/FFF?text=No+Preview'; this.parentElement.classList.remove('img-skeleton')">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="absolute bottom-2 left-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-[10px] font-bold text-white bg-black/50 px-2 py-0.5 rounded-full">${idx + 1}</span>
                            </div>
                        </div>
                        <div class="card-info p-2.5 sm:p-3">
                            <p class="text-[10px] sm:text-xs text-indigo-400 font-semibold mb-0.5">${date}</p>
                            <h3 class="text-xs sm:text-sm font-medium text-gray-200 truncate" title="${scan.name}">${scan.name}</h3>
                        </div>`;
                    card.addEventListener('click', () => openLightbox(idx));
                    scanGrid.appendChild(card);
                });
            }

            // ---- Lightbox ----
            function openLightbox(idx) {
                currentIndex = idx;
                showLightboxImage(idx);
                lightbox.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    lightbox.classList.remove('opacity-0');
                    lightboxImg.classList.remove('scale-95');
                    lightboxImg.classList.add('scale-100');
                }, 10);
                if (navigator.vibrate) navigator.vibrate(15);
            }

            function showLightboxImage(idx) {
                const scan = filteredScans[idx];
                let imageUrl = scan.url;
                if (scan.id) imageUrl = `https://lh3.googleusercontent.com/d/${scan.id}`;
                lightboxImg.src = imageUrl;
                downloadLink.href = scan.url;
                lbCaption.textContent = `${scan.name}  (${idx + 1} / ${filteredScans.length})`;
                lbPrev.style.display = idx > 0 ? 'flex' : 'none';
                lbNext.style.display = idx < filteredScans.length - 1 ? 'flex' : 'none';
            }

            function closeLightboxModal() {
                lightbox.classList.add('opacity-0');
                lightboxImg.classList.remove('scale-100');
                lightboxImg.classList.add('scale-95');
                document.body.style.overflow = '';
                setTimeout(() => { lightbox.classList.add('hidden'); lightboxImg.src = ''; }, 300);
            }

            closeLb.addEventListener('click', closeLightboxModal);
            lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightboxModal(); });
            lbPrev.addEventListener('click', e => { e.stopPropagation(); if (currentIndex > 0) { currentIndex--; showLightboxImage(currentIndex); } });
            lbNext.addEventListener('click', e => { e.stopPropagation(); if (currentIndex < filteredScans.length - 1) { currentIndex++; showLightboxImage(currentIndex); } });

            // Keyboard nav
            document.addEventListener('keydown', e => {
                if (lightbox.classList.contains('hidden')) return;
                if (e.key === 'Escape') closeLightboxModal();
                if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; showLightboxImage(currentIndex); }
                if (e.key === 'ArrowRight' && currentIndex < filteredScans.length - 1) { currentIndex++; showLightboxImage(currentIndex); }
            });

            // Swipe gestures on lightbox
            let lbTouchStartX = 0, lbTouchStartY = 0;
            lightbox.addEventListener('touchstart', e => {
                lbTouchStartX = e.touches[0].clientX;
                lbTouchStartY = e.touches[0].clientY;
            }, { passive: true });
            lightbox.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - lbTouchStartX;
                const dy = e.changedTouches[0].clientY - lbTouchStartY;
                if (Math.abs(dy) > Math.abs(dx) && dy > 80) { closeLightboxModal(); return; }
                if (Math.abs(dx) > 60) {
                    if (dx < 0 && currentIndex < filteredScans.length - 1) { currentIndex++; showLightboxImage(currentIndex); }
                    if (dx > 0 && currentIndex > 0) { currentIndex--; showLightboxImage(currentIndex); }
                }
            }, { passive: true });

            // Search
            searchInput.addEventListener('input', e => {
                const term = e.target.value.toLowerCase();
                clearSearch.classList.toggle('hidden', !term);
                const filtered = allScans.filter(s => s.name.toLowerCase().includes(term) || (s.timestamp && s.timestamp.toLowerCase().includes(term)));
                renderScans(filtered);
            });
            clearSearch.addEventListener('click', () => {
                searchInput.value = '';
                clearSearch.classList.add('hidden');
                renderScans(allScans);
                searchInput.focus();
            });

            fetchScans();

            // ===== Pull-to-Refresh =====
            const ptr = document.createElement('div');
            ptr.className = 'ptr-indicator';
            ptr.innerHTML = '<i class="fa-solid fa-arrows-rotate ptr-icon"></i><span class="ptr-text">Pull to refresh</span>';
            document.body.appendChild(ptr);
            let ptrStartY = 0, ptrPulling = false;
            document.addEventListener('touchstart', e => { if (window.scrollY === 0) { ptrStartY = e.touches[0].clientY; ptrPulling = true; } }, { passive: true });
            document.addEventListener('touchmove', e => {
                if (!ptrPulling) return;
                const dy = e.touches[0].clientY - ptrStartY;
                if (dy > 30) { ptr.classList.add('visible'); ptr.querySelector('.ptr-text').textContent = dy > 80 ? 'Release to refresh' : 'Pull to refresh'; }
            }, { passive: true });
            document.addEventListener('touchend', e => {
                if (!ptrPulling) return; ptrPulling = false;
                const dy = e.changedTouches[0].clientY - ptrStartY;
                if (dy > 80) {
                    ptr.classList.add('refreshing'); ptr.querySelector('.ptr-text').textContent = 'Refreshing…';
                    if (navigator.vibrate) navigator.vibrate(30);
                    showSkeletons(); loader.classList.remove('hidden'); scanGrid.classList.add('hidden');
                    setTimeout(fetchScans, 300);
                    setTimeout(() => ptr.classList.remove('visible', 'refreshing'), 1200);
                } else ptr.classList.remove('visible');
            }, { passive: true });
        });
    </script>
</body>
</html>
