<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="./manifest.json">
    <title data-translate-key="cashewReportTitle">Cashew Report - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --success: #10b981;
            --surface: rgba(15, 23, 42, 0.7);
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Abstract Background Elements */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
        }

        .mesh-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%),
                radial-gradient(at 50% 0%, rgba(168, 85, 247, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.1) 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.5;
            z-index: -2;
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .bento-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.8);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
            border-color: var(--primary);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Animation for numbers */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-value { animation: countUp 0.5s ease-out forwards; }

        /* Tabs Styling */
        .tab-active {
            color: white;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        /* Category progress bar */
        .progress-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .mobile-padding { padding: 1rem; }
            .mobile-grid { grid-template-columns: 1fr; }
            .header-sticky { position: sticky; top: 0; z-index: 40; width: 100%; }
        }

        /* Pull to refresh */
        .ptr-indicator {
            position: fixed;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 100;
            transition: top 0.3s;
        }
        .ptr-indicator.active { top: 20px; }

        /* FAB for mobile */
        .mobile-fab {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            z-index: 50;
            transform: scale(1);
            transition: transform 0.2s;
        }
        .mobile-fab:active { transform: scale(0.9); }

        /* Transaction Item Polish */
        .transaction-item {
            position: relative;
            overflow: hidden;
        }
        .transaction-item::after {
            content: '';
            position: absolute;
            left: 0;
            top: 25%;
            height: 50%;
            width: 3px;
            background: currentColor;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 0 4px 4px 0;
        }
        .transaction-item:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body class="pb-20 md:pb-8">
    <div class="bg-glow"></div>
    <div class="mesh-gradient"></div>

    <div id="ptr" class="ptr-indicator">
        <i class="fa-solid fa-arrows-rotate animate-spin"></i>
        <span>Refreshing...</span>
    </div>

    <!-- Main Container -->
    <div class="max-w-[1400px] mx-auto mobile-padding px-6 pt-4 md:pt-8">

        <!-- Navbar / Header -->
        <header class="header-sticky mb-8">
            <div class="glass rounded-3xl p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i class="fa-solid fa-chart-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-white leading-tight">Cashew Report</h1>
                        <p class="text-[10px] md:text-xs text-gray-400 font-bold uppercase tracking-widest">Financial Insights</p>
                    </div>
                </div>

                <!-- Action Bar -->
                <div class="flex items-center gap-2 md:gap-3">
                    <button onclick="toggleCalculator()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white transition-all hover:bg-white/10 active:scale-95">
                        <i class="fa-solid fa-calculator"></i>
                    </button>
                    <button onclick="openExportOptions()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white transition-all hover:bg-white/10 active:scale-95">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                    </button>
                    <div class="h-8 w-px bg-white/10 mx-1 hidden md:block"></div>
                    <a href="cashew.html" class="hidden md:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-indigo-600/20">
                        <i class="fa-solid fa-plus"></i>
                        <span>New Expense</span>
                    </a>
                    <a href="../index.html" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white transition-all hover:bg-white/10 active:scale-95">
                        <i class="fa-solid fa-house"></i>
                    </a>
                </div>
            </div>
        </header>

        <!-- Bento Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">

            <!-- Left Column: Summary Stats -->
            <div class="md:col-span-12 lg:col-span-4 space-y-6">

                <!-- Filters Card -->
                <div class="glass rounded-[2rem] p-6 bento-card">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-filter text-indigo-400"></i> Period Selection
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">Month</label>
                            <div class="relative">
                                <select id="month-select" class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-2.5 pl-3 pr-8 text-sm font-semibold outline-none appearance-none focus:border-indigo-500 transition-all text-white" onchange="handleMonthChange()">
                                    <option value="All">All Time</option>
                                    <option value="Jan">January</option><option value="Feb">February</option><option value="Mar">March</option>
                                    <option value="Apr">April</option><option value="May">May</option><option value="Jun">June</option>
                                    <option value="Jul">July</option><option value="Aug">August</option><option value="Sep">September</option>
                                    <option value="Oct">October</option><option value="Nov">November</option><option value="Dec">December</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-gray-500 pointer-events-none"></i>
                            </div>
                        </div>
                        <div id="year-select-container" class="space-y-1.5">
                            <label class="text-[10px] text-gray-400 font-bold ml-1 uppercase">Year</label>
                            <div class="relative">
                                <select id="year-select" class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-2.5 pl-3 pr-8 text-sm font-semibold outline-none appearance-none focus:border-indigo-500 transition-all text-white">
                                    <!-- Years via JS -->
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-gray-500 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                    <button onclick="fetchReport()" id="fetch-btn" class="w-full mt-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 group">
                        <i class="fa-solid fa-rotate text-indigo-400 group-hover:rotate-180 transition-transform duration-500"></i>
                        <span>Fetch Report</span>
                    </button>
                </div>

                <!-- Main Stats Cards -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
                    <!-- Total Expense -->
                    <div class="glass rounded-3xl p-5 bento-card border-l-4 border-l-rose-500/50">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-400">
                                    <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
                                </div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total Spent</p>
                            </div>
                            <span class="text-[9px] font-bold text-rose-400 bg-rose-500/5 px-2 py-1 rounded-lg">Expenditure</span>
                        </div>
                        <h2 id="total-expenses-display" class="text-2xl font-black text-white font-mono">Rs. 0.00</h2>
                        <div class="mt-3 flex items-center gap-2 text-[9px] text-gray-500">
                            <span id="selected-period-label" class="bg-white/5 px-2 py-0.5 rounded text-gray-400">---</span>
                        </div>
                    </div>

                    <!-- Available Balance -->
                    <div id="available-balance-container" class="glass rounded-3xl p-5 bento-card border-l-4 border-l-emerald-500/50">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                                    <i class="fa-solid fa-wallet text-sm"></i>
                                </div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Available Balance</p>
                            </div>
                            <span class="text-[9px] font-bold text-emerald-400 bg-emerald-500/5 px-2 py-1 rounded-lg">Remaining</span>
                        </div>
                        <h2 id="available-balance-display" class="text-2xl font-black text-white font-mono">Rs. 0.00</h2>
                        <p class="mt-3 text-[9px] text-gray-500 italic">Estimated from records</p>
                    </div>
                </div>

            </div>

            <!-- Right Column: Details & Insights -->
            <div class="md:col-span-12 lg:col-span-8 space-y-6">

                <!-- Tabs and Search -->
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                    <div class="flex p-1 bg-white/5 rounded-2xl border border-white/5 w-full sm:w-auto">
                        <button onclick="switchView('transactions')" id="tab-transactions" class="flex-1 sm:flex-none px-6 py-2 rounded-xl text-sm font-bold transition-all text-gray-400 tab-active">Transactions</button>
                        <button onclick="switchView('insights')" id="tab-insights" class="flex-1 sm:flex-none px-6 py-2 rounded-xl text-sm font-bold transition-all text-gray-400">Insights</button>
                    </div>

                    <div class="relative w-full sm:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input type="text" id="search-input" placeholder="Search description..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-2.5 pl-11 pr-4 text-sm font-medium outline-none focus:border-indigo-500 transition-all text-white placeholder-gray-600" onkeyup="filterData()">
                    </div>
                </div>

                <!-- Transactions View -->
                <div id="view-transactions" class="space-y-4">
                    <div class="flex items-center justify-between px-2 mb-2">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Transaction History</h3>
                        <div class="relative">
                            <select id="category-filter" class="bg-transparent text-[10px] font-bold text-indigo-400 uppercase outline-none cursor-pointer" onchange="filterData()">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                    </div>
                    <div id="report-body" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Insights View (Hidden by default) -->
                <div id="view-insights" class="hidden space-y-6">
                    <!-- Category Summary Grid -->
                    <div id="category-summary-section" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/80 backdrop-blur-md transition-all">
        <div class="flex flex-col items-center gap-6">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 border-4 border-indigo-500/10 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-indigo-500 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <div class="text-center">
                <h3 class="text-white font-bold text-lg">Analyzing Data</h3>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Please wait a moment</p>
            </div>
        </div>
    </div>

    <!-- Calculator & Modals (Re-styled) -->
    <div id="calculator-modal" class="hidden fixed inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm z-[70] p-4">
        <!-- Calculator content kept but with updated glass styling -->
        <div class="glass p-6 rounded-[2rem] w-full max-w-[340px] shadow-2xl border border-white/20">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-calculator text-indigo-400"></i> Calculator</h3>
                <button onclick="toggleCalculator()" class="text-gray-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="bg-slate-950/50 p-6 rounded-2xl mb-6 text-right flex flex-col justify-end h-28 border border-white/5">
                <div id="calc-history" class="text-[10px] text-indigo-400/50 font-mono mb-1 truncate"></div>
                <div id="calc-display" class="text-3xl font-mono text-white tracking-wider overflow-x-auto">0</div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button onclick="calcClear()" class="col-span-2 py-4 rounded-xl bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 font-bold transition">AC</button>
                <button onclick="calcDelete()" class="py-4 rounded-xl bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 font-bold transition"><i class="fa-solid fa-delete-left"></i></button>
                <button onclick="calcAppend('/')" class="py-4 rounded-xl bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 font-bold transition">÷</button>

                <button onclick="calcAppend('7')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">7</button>
                <button onclick="calcAppend('8')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">8</button>
                <button onclick="calcAppend('9')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">9</button>
                <button onclick="calcAppend('*')" class="py-4 rounded-xl bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 font-bold transition">×</button>

                <button onclick="calcAppend('4')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">4</button>
                <button onclick="calcAppend('5')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">5</button>
                <button onclick="calcAppend('6')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">6</button>
                <button onclick="calcAppend('-')" class="py-4 rounded-xl bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 font-bold transition">−</button>

                <button onclick="calcAppend('1')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">1</button>
                <button onclick="calcAppend('2')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">2</button>
                <button onclick="calcAppend('3')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">3</button>
                <button onclick="calcAppend('+')" class="py-4 rounded-xl bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 font-bold transition">+</button>

                <button onclick="calcAppend('0')" class="col-span-2 py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">0</button>
                <button onclick="calcAppend('.')" class="py-4 rounded-xl bg-white/5 text-white hover:bg-white/10 font-bold transition">.</button>
                <button onclick="calcResult()" class="py-4 rounded-xl bg-indigo-600 text-white hover:bg-indigo-500 font-bold transition shadow-lg shadow-indigo-600/20">=</button>
            </div>
        </div>
    </div>

    <!-- Export Modal & Preview (Simplified and Restyled) -->
    <div id="export-options-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass rounded-[2rem] w-full max-w-lg overflow-hidden border border-white/10">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-file-export text-indigo-400"></i> Export Records</h3>
                <button onclick="closeExportOptions()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">Category</label>
                    <select id="export-category-select" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm font-semibold outline-none text-white"></select>
                </div>
                <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <input type="checkbox" id="export-current-month-only" class="w-5 h-5 rounded border-white/10 bg-slate-900 accent-indigo-500" onchange="toggleExportCurrentMonth()">
                    <label for="export-current-month-only" class="text-sm text-gray-300 font-bold">Current Month Only</label>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">From</label>
                        <div class="flex gap-2">
                            <select id="export-from-month-select" class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-2.5 text-xs font-semibold text-white"></select>
                            <select id="export-from-year-select" class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-2.5 text-xs font-semibold text-white"></select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-gray-400 font-bold uppercase ml-1">To</label>
                        <div class="flex gap-2">
                            <select id="export-to-month-select" class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-2.5 text-xs font-semibold text-white"></select>
                            <select id="export-to-year-select" class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl p-2.5 text-xs font-semibold text-white"></select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 flex justify-end gap-3">
                <button onclick="closeExportOptions()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-white transition-all">Cancel</button>
                <button onclick="startExportProcess()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-indigo-600/20">Generate Export</button>
            </div>
        </div>
    </div>

    <!-- Export Preview -->
    <div id="export-preview-modal" class="hidden fixed inset-0 z-[80] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="glass rounded-[2rem] w-full max-w-4xl max-h-[90vh] flex flex-col border border-white/10">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">Export Preview</h3>
                <button onclick="closeExportPreview()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 flex-grow overflow-auto">
                <pre id="export-content-preview" class="text-[10px] md:text-xs text-indigo-300 font-mono whitespace-pre-wrap"></pre>
            </div>
            <div class="p-6 border-t border-white/5 flex flex-wrap justify-end gap-3">
                <button onclick="closeExportPreview()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-white">Close</button>
                <button id="copy-report-btn" onclick="copyReportToClipboard()" class="bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
                <button id="download-pdf-btn" class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> PDF
                </button>
                <button id="download-export-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> .TXT
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile FAB -->
    <a href="cashew.html" class="mobile-fab md:hidden">
        <i class="fa-solid fa-plus text-xl"></i>
    </a>

    <script src="../localization.js"></script>
    <script>
        let allData = [];
        let monthlyBalances = {};
        let currentView = 'transactions';

        function switchView(view) {
            currentView = view;
            document.getElementById('view-insights').classList.toggle('hidden', view !== 'insights');
            document.getElementById('view-transactions').classList.toggle('hidden', view !== 'transactions');

            document.getElementById('tab-insights').classList.toggle('tab-active', view === 'insights');
            document.getElementById('tab-transactions').classList.toggle('tab-active', view === 'transactions');

            if (view === 'transactions') filterData();
        }

        function handleMonthChange() {
            const monthSelect = document.getElementById('month-select');
            const yearSelect = document.getElementById('year-select');
            const yearContainer = document.getElementById('year-select-container');
            if (monthSelect.value === 'All') {
                yearSelect.disabled = true;
                yearContainer.style.opacity = '0.5';
            } else {
                yearSelect.disabled = false;
                yearContainer.style.opacity = '1';
            }
        }

        function init() {
            const yearSelect = document.getElementById('year-select');
            const currentYear = new Date().getFullYear();
            for (let year = currentYear; year >= 2020; year--) {
                const option = document.createElement('option');
                option.value = year; option.textContent = year;
                yearSelect.appendChild(option);
            }
            yearSelect.value = currentYear;

            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            document.getElementById('month-select').value = months[new Date().getMonth()];

            handleMonthChange();
            fetchReport();
        }

        function getCategoryColor(category) {
            const cat = (category || '').toLowerCase();
            if(cat.includes('home')) return { main: '#6366f1', bg: 'rgba(99, 102, 241, 0.1)', icon: 'fa-house' };
            if(cat.includes('personal')) return { main: '#a855f7', bg: 'rgba(168, 85, 247, 0.1)', icon: 'fa-user' };
            if(cat.includes('family')) return { main: '#10b981', bg: 'rgba(16, 185, 129, 0.1)', icon: 'fa-users' };
            if(cat.includes('baby')) return { main: '#f43f5e', bg: 'rgba(244, 63, 94, 0.1)', icon: 'fa-baby' };
            if(cat.includes('credit')) return { main: '#f59e0b', bg: 'rgba(245, 158, 11, 0.1)', icon: 'fa-credit-card' };
            if(cat.includes('emi')) return { main: '#ef4444', bg: 'rgba(239, 68, 68, 0.1)', icon: 'fa-file-invoice-dollar' };
            if(cat.includes('mutual') || cat.includes('invest')) return { main: '#06b6d4', bg: 'rgba(6, 182, 212, 0.1)', icon: 'fa-chart-line' };
            if(cat.includes('latha')) return { main: '#ec4899', bg: 'rgba(236, 72, 153, 0.1)', icon: 'fa-heart' };
            return { main: '#94a3b8', bg: 'rgba(148, 163, 184, 0.1)', icon: 'fa-tag' };
        }

        function fetchReport() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const month = document.getElementById('month-select').value;
            const year = document.getElementById('year-select').value;
            let url = month === 'All'
                ? `${CONFIG.GOOGLE_SHEET_URL_CASHEW}?fetchAll=true&t=${Date.now()}`
                : `${CONFIG.GOOGLE_SHEET_URL_CASHEW}?sheetName=${encodeURIComponent(month + ' ' + year)}&t=${Date.now()}`;

            fetch(url)
                .then(r => r.json())
                .then(res => {
                    allData = res.data || [];
                    monthlyBalances = res.monthlyBalances || {};
                    populateCategoryFilter(allData);
                    updateStats(res.availableBalance || 0);
                    populateInsights(allData);
                    filterData();
                    loader.classList.add('hidden');
                })
                .catch(e => {
                    console.error(e);
                    loader.classList.add('hidden');
                    alert('Error loading data');
                });
        }

        function updateStats(balance) {
            let total = allData.reduce((acc, row) => acc + (row.amount || 0), 0);
            document.getElementById('total-expenses-display').textContent = `Rs. ${total.toLocaleString('en-IN')}`;
            document.getElementById('available-balance-display').textContent = `Rs. ${balance.toLocaleString('en-IN')}`;

            const monthVal = document.getElementById('month-select').value;
            document.getElementById('selected-period-label').textContent = monthVal === 'All' ? 'All Time Records' : `${monthVal} ${document.getElementById('year-select').value}`;
        }

        function populateInsights(data) {
            const container = document.getElementById('category-summary-section');
            container.innerHTML = '';

            if(!data.length) return;

            const categoryTotals = data.reduce((acc, row) => {
                acc[row.category] = (acc[row.category] || 0) + row.amount;
                return acc;
            }, {});

            const sorted = Object.entries(categoryTotals).sort((a,b) => b[1] - a[1]);
            const grandTotal = sorted.reduce((a,b) => a + b[1], 0);

            sorted.forEach(([cat, amount]) => {
                const color = getCategoryColor(cat);
                const percent = (amount / grandTotal * 100).toFixed(1);

                const card = document.createElement('div');
                card.className = "glass p-5 rounded-[2rem] bento-card border border-white/5";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:${color.bg};color:${color.main}">
                                <i class="fa-solid ${color.icon}"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm">${cat}</h4>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">${percent}% of total</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-white font-mono">Rs. ${amount.toLocaleString('en-IN')}</p>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:0;background:${color.main}"></div>
                    </div>
                `;
                container.appendChild(card);
                setTimeout(() => {
                    card.querySelector('.progress-fill').style.width = percent + '%';
                }, 100);
            });
        }

        function populateCategoryFilter(data) {
            const filter = document.getElementById('category-filter');
            filter.innerHTML = '<option value="">All Categories</option>';
            const cats = [...new Set(data.map(r => r.category))].sort();
            cats.forEach(c => {
                const o = document.createElement('option');
                o.value = c; o.textContent = c;
                filter.appendChild(o);
            });
        }

        function filterData() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const catFilter = document.getElementById('category-filter').value;

            const filtered = allData.filter(r => {
                const mSearch = String(r.description || '').toLowerCase().includes(search);
                const mCat = !catFilter || r.category === catFilter;
                return mSearch && mCat;
            });

            renderTransactions(filtered);
        }

        function formatDate(iso) {
            const d = new Date(iso);
            if(isNaN(d.getTime())) return iso;
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${d.getDate().toString().padStart(2,'0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
        }

        function renderTransactions(data) {
            const body = document.getElementById('report-body');
            body.innerHTML = '';

            if(!data.length) {
                body.innerHTML = '<div class="py-12 text-center text-gray-500 text-xs uppercase tracking-widest">No matching records</div>';
                return;
            }

            // Group by date
            const grouped = data.reduce((acc, r) => {
                const date = formatDate(r.date);
                if(!acc[date]) acc[date] = { items: [], total: 0 };
                acc[date].items.push(r);
                acc[date].total += r.amount;
                return acc;
            }, {});

            Object.entries(grouped).sort((a,b) => new Date(b[0]) - new Date(a[0])).forEach(([date, group], idx) => {
                const dateBlock = document.createElement('div');
                dateBlock.className = "space-y-3";

                const header = document.createElement('div');
                header.className = "flex justify-between items-center px-4 py-1.5";
                header.innerHTML = `
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-calendar-day text-indigo-400/50"></i> ${date}
                    </span>
                    <span class="text-[10px] font-bold text-indigo-400 font-mono bg-indigo-500/10 px-2 py-0.5 rounded-lg border border-indigo-500/20">Rs. ${group.total.toLocaleString('en-IN')}</span>
                `;
                dateBlock.appendChild(header);

                group.items.forEach(item => {
                    const color = getCategoryColor(item.category);
                    const row = document.createElement('div');
                    row.className = "glass p-4 rounded-2xl flex items-center justify-between border border-white/5 hover:bg-white/10 transition-all cursor-pointer group/item transaction-item";
                    row.style.color = color.main;
                    row.onclick = () => editDateEntries(date);
                    row.innerHTML = `
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center text-base shadow-inner transition-transform group-hover/item:scale-110" style="background:${color.bg};color:${color.main}">
                                <i class="fa-solid ${color.icon}"></i>
                            </div>
                            <div class="min-w-0">
                                <h4 class="text-xs font-bold text-white group-hover/item:text-indigo-400 transition-colors">${item.category}</h4>
                                <p class="text-[10px] text-gray-500 truncate mt-0.5 group-hover/item:text-gray-400">${item.description || 'No description'}</p>
                            </div>
                        </div>
                        <div class="text-right pl-4">
                            <p class="text-sm font-bold text-white font-mono group-hover/item:scale-105 transition-transform">Rs. ${item.amount.toLocaleString('en-IN')}</p>
                            <div class="flex items-center justify-end gap-1 mt-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
                                <span class="text-[8px] text-gray-500 uppercase font-bold">Edit</span>
                                <i class="fa-solid fa-chevron-right text-[8px] text-gray-600"></i>
                            </div>
                        </div>
                    `;
                    dateBlock.appendChild(row);
                });
                body.appendChild(dateBlock);
            });
        }

        function editDateEntries(date) {
            const entries = allData.filter(i => formatDate(i.date) === date);
            if(entries.length) {
                localStorage.setItem('cashewEditData', JSON.stringify(entries));
                window.location.href = 'cashew.html';
            }
        }

        // --- Export Logic ---
        function openExportOptions() {
            const modal = document.getElementById('export-options-modal');
            const catSelect = document.getElementById('export-category-select');
            catSelect.innerHTML = '<option value="All">All Categories</option>';
            [...new Set(allData.map(r => r.category))].sort().forEach(c => {
                const o = document.createElement('option');
                o.value = c; o.textContent = c;
                catSelect.appendChild(o);
            });

            // Populate dates
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const yearSelects = [document.getElementById('export-from-year-select'), document.getElementById('export-to-year-select')];
            const monthSelects = [document.getElementById('export-from-month-select'), document.getElementById('export-to-month-select')];

            const curYear = new Date().getFullYear();
            yearSelects.forEach(s => {
                s.innerHTML = '';
                for(let y=curYear; y>=2020; y--) { s.innerHTML += `<option value="${y}">${y}</option>`; }
            });
            monthSelects.forEach(s => {
                s.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            });

            modal.classList.remove('hidden');
        }

        function closeExportOptions() { document.getElementById('export-options-modal').classList.add('hidden'); }
        function toggleExportCurrentMonth() {
            const checked = document.getElementById('export-current-month-only').checked;
            const fields = ['export-from-month-select', 'export-from-year-select', 'export-to-month-select', 'export-to-year-select'];
            fields.forEach(id => document.getElementById(id).disabled = checked);
        }

        function startExportProcess() {
            closeExportOptions();
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const category = document.getElementById('export-category-select').value;
            const fM = document.getElementById('export-from-month-select').value;
            const fY = document.getElementById('export-from-year-select').value;
            const tM = document.getElementById('export-to-month-select').value;
            const tY = document.getElementById('export-to-year-select').value;

            fetch(`${CONFIG.GOOGLE_SHEET_URL_CASHEW}?fetchAll=true&t=${Date.now()}`)
                .then(r => r.json())
                .then(res => {
                    loader.classList.add('hidden');
                    generateExportContent(res.data || [], category, fM, fY, tM, tY);
                })
                .catch(e => { loader.classList.add('hidden'); alert('Export failed'); });
        }

        function generateExportContent(data, category, fM, fY, tM, tY) {
            // Re-using the logic from the previous version but simplified
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const start = new Date(fY, months.indexOf(fM), 1);
            const end = new Date(tY, months.indexOf(tM) + 1, 0);

            let filtered = data.filter(i => {
                const d = new Date(i.date);
                const periodOk = d >= start && d <= end;
                const catOk = category === 'All' || i.category === category;
                return periodOk && catOk;
            });

            if(!filtered.length) { alert('No data to export'); return; }

            let text = `CASHEW REPORT\n${'='.repeat(30)}\n`;
            text += `Period: ${fM} ${fY} - ${tM} ${tY}\n`;
            text += `Category: ${category}\n${'='.repeat(30)}\n\n`;

            let total = 0;
            filtered.forEach(i => {
                text += `${formatDate(i.date)} | ${i.category.padEnd(15)} | Rs. ${i.amount.toLocaleString('en-IN').padEnd(10)} | ${i.description}\n`;
                total += i.amount;
            });
            text += `\n${'-'.repeat(30)}\nGRAND TOTAL: Rs. ${total.toLocaleString('en-IN')}\n${'='.repeat(30)}`;

            document.getElementById('export-content-preview').textContent = text;
            document.getElementById('export-preview-modal').classList.remove('hidden');

            window._exportData = { text, filename: `Cashew_Report_${category}_${fM}${fY}.txt` };
        }

        function closeExportPreview() { document.getElementById('export-preview-modal').classList.add('hidden'); }
        function copyReportToClipboard() {
            navigator.clipboard.writeText(window._exportData.text).then(() => alert('Copied!'));
        }

        function triggerDownload() {
            const blob = new Blob([window._exportData.text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = window._exportData.filename;
            a.click();
        }

        function triggerPdfDownload() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("courier");
            doc.setFontSize(10);
            const lines = doc.splitTextToSize(window._exportData.text, 180);
            doc.text(lines, 10, 10);
            doc.save(window._exportData.filename.replace('.txt', '.pdf'));
        }

        document.getElementById('download-export-btn').onclick = triggerDownload;
        document.getElementById('download-pdf-btn').onclick = triggerPdfDownload;

        // Calculator Logic
        let calcExpression = "";
        function toggleCalculator() { document.getElementById('calculator-modal').classList.toggle('hidden'); }
        function calcAppend(v) { calcExpression += v; updateCalcUI(); }
        function calcClear() { calcExpression = ""; updateCalcUI(); }
        function calcDelete() { calcExpression = calcExpression.slice(0,-1); updateCalcUI(); }
        function updateCalcUI() {
            const hist = document.getElementById('calc-history');
            const disp = document.getElementById('calc-display');
            const ops = ['+','-','*','/'];
            let lastIdx = -1;
            for(let i=calcExpression.length-1; i>=0; i--) if(ops.includes(calcExpression[i])) { lastIdx = i; break; }
            if(lastIdx !== -1) {
                hist.textContent = calcExpression.slice(0, lastIdx+1);
                disp.textContent = calcExpression.slice(lastIdx+1);
            } else { hist.textContent = ""; disp.textContent = calcExpression || "0"; }
        }
        function calcResult() {
            try {
                let res = eval(calcExpression);
                document.getElementById('calc-history').textContent = calcExpression + " =";
                document.getElementById('calc-display').textContent = res;
                calcExpression = String(res);
            } catch(e) { document.getElementById('calc-display').textContent = "Error"; calcExpression = ""; }
        }

        // Pull to refresh logic
        let touchStartY = 0;
        document.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY, {passive: true});
        document.addEventListener('touchmove', e => {
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            if(window.scrollY === 0 && diff > 100) document.getElementById('ptr').classList.add('active');
        }, {passive: true});
        document.addEventListener('touchend', e => {
            const ptr = document.getElementById('ptr');
            if(ptr.classList.contains('active')) {
                fetchReport();
                setTimeout(() => ptr.classList.remove('active'), 1000);
            }
        });

        init();
    </script>
</body>

</html>
