<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>Loan Report - Loan Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --accent: #ec4899;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Repayment Modal Styles */
        .repayment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .month-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .month-box:hover {
            border-color: var(--primary);
        }

        .month-box.paid {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            color: #34d399;
        }

        .month-box.pending {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        /* Popup Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
        }

        .popup-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
        }

        .popup-success .popup-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .popup-error .popup-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Payment Modal Specific Styles */
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px 12px 45px;
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-group select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group input:focus + i {
            color: var(--primary);
        }

        /* ===== MOBILE RESPONSIVE IMPROVEMENTS ===== */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            box-sizing: border-box;
        }

        body {
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        button, a {
            touch-action: manipulation;
        }

        /* Nav safe area */
        nav.sticky {
            padding-top: max(0px, env(safe-area-inset-top));
        }

        /* Touch target for icon buttons */
        .icon-btn {
            min-width: 44px !important;
            min-height: 44px !important;
        }

        @media (max-width: 640px) {
            /* Nav */
            nav .flex.items-center.justify-between.h-16 {
                height: auto !important;
                padding: 0.625rem 0 !important;
            }

            nav a.text-xl { font-size: 1rem !important; }

            /* Main padding */
            main.max-w-7xl { padding: 0.75rem !important; }

            /* Summary cards - horizontal scroll on tiny phones, stack on medium */
            .grid.grid-cols-1.md\\:grid-cols-3.gap-6.mb-8 {
                grid-template-columns: 1fr !important;
                gap: 0.75rem !important;
                margin-bottom: 1.25rem !important;
            }

            /* Summary card internal layout */
            .glass-card.rounded-2xl.p-6.flex.items-center.gap-6 {
                padding: 1rem !important;
                gap: 0.875rem !important;
            }

            .w-16.h-16.rounded-full {
                width: 3rem !important;
                height: 3rem !important;
                flex-shrink: 0;
            }

            .w-16.h-16.rounded-full i {
                font-size: 1.25rem !important;
            }

            /* Summary values */
            .text-2xl.sm\\:text-3xl.font-bold {
                font-size: 1.4rem !important;
            }

            /* Loan cards grid */
            .grid.grid-cols-1.md\\:grid-cols-2.lg\\:grid-cols-3 {
                grid-template-columns: 1fr !important;
                gap: 1rem !important;
            }

            /* Loan card actions - larger touch targets */
            .glass-card .flex.gap-2 .icon-btn {
                width: 44px !important;
                height: 44px !important;
            }

            /* Loan card - fix overflow */
            .glass-card.rounded-2xl.p-6 {
                padding: 1rem !important;
            }

            /* Modal - full screen on mobile */
            #repayment-modal > div,
            #payment-modal > div {
                max-width: 100% !important;
                width: 100% !important;
                max-height: 100% !important;
                height: 100% !important;
                border-radius: 0 !important;
                margin: 0 !important;
            }

            #repayment-modal,
            #payment-modal {
                padding: 0 !important;
                align-items: flex-end !important;
            }

            #repayment-modal > div,
            #payment-modal > div {
                border-radius: 1.25rem 1.25rem 0 0 !important;
                max-height: 90vh !important;
                height: auto !important;
            }

            /* Repayment grid - more columns on mobile */
            .repayment-grid {
                grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)) !important;
                gap: 6px !important;
            }

            .month-box {
                padding: 6px !important;
                font-size: 0.7rem !important;
            }

            /* Payment form inputs - prevent iOS zoom */
            .form-group input,
            .form-group select,
            .form-group textarea {
                font-size: 16px !important;
            }

            /* Popup responsive */
            .popup-content {
                width: 92vw !important;
                max-width: 92vw !important;
            }
        }

        /* Progress bar smooth */
        .bg-indigo-500.h-2\\.5.rounded-full {
            transition: width 0.5s ease;
        }

        /* iOS momentum scrolling */
        #repayment-grid {
            -webkit-overflow-scrolling: touch;
        }

        /* Prevent body scroll when modal open */
        body.modal-open {
            overflow: hidden;
        }

        /* ===== MOBILE ENHANCEMENTS ===== */
        .ptr-indicator {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 0.5rem);
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(30,41,59,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 200;
            transition: transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .ptr-indicator.visible { transform: translateX(-50%) translateY(0); }
        .ptr-indicator.refreshing .ptr-icon { animation: ptr-spin 1s linear infinite; }
        @keyframes ptr-spin { to { transform: rotate(360deg); } }

        .kt-toast {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(30,41,59,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc;
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
            max-width: 92vw;
        }
        .kt-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .kt-toast.success { border-color: rgba(16,185,129,0.5); }
        .kt-toast.error { border-color: rgba(239,68,68,0.5); }

        .kt-fab {
            position: fixed;
            bottom: calc(1.5rem + env(safe-area-inset-bottom));
            right: max(1.25rem, env(safe-area-inset-right));
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.2s ease;
            text-decoration: none;
        }
        .kt-fab:active { transform: scale(0.9); }
        @media (min-width: 768px) { .kt-fab { display: none; } }

        /* Loan card touch press */
        @media (hover: none) {
            .glass-card.rounded-2xl:active { opacity: 0.85; transform: scale(0.99); }
        }

        /* Progress bar */
        .bg-indigo-500 { will-change: width; }

        /* Swipe bottom sheet drag handle */
        .drag-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 0 auto 1rem;
        }
    </style>
</head>

<body class="min-h-screen" style="padding-bottom: env(safe-area-inset-bottom);">

    <nav class="sticky top-0 z-40 glass-card border-b-0 rounded-none" style="padding-top: env(safe-area-inset-top);">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex-shrink-0 text-white text-base sm:text-xl font-bold flex items-center gap-2">
                        <i class="fa-solid fa-hand-holding-dollar text-indigo-400"></i>
                        <span>Loan Report</span>
                    </a>
                </div>
                <div class="flex items-center gap-2">
                    <a href="loan.html" class="icon-btn" title="Add New Loan">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                    <button onclick="fetchLoans()" class="icon-btn" title="Refresh Data">
                        <i class="fa-solid fa-sync"></i>
                    </button>
                    <a href="../index.html" class="icon-btn" title="Home">
                        <i class="fa-solid fa-home"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-8">

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-6 mb-5 sm:mb-8">
            <div class="glass-card rounded-2xl p-4 sm:p-6 flex items-center gap-4 sm:gap-6">
                <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-indigo-500/20 flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-landmark text-2xl sm:text-3xl text-indigo-400"></i>
                </div>
                <div>
                    <p class="text-sm text-indigo-300 font-semibold">Total Loan Amount</p>
                    <p id="total-loan" class="text-xl sm:text-3xl font-bold">₹0</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-4 sm:p-6 flex items-center gap-4 sm:gap-6">
                <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-hand-holding-dollar text-2xl sm:text-3xl text-emerald-400"></i>
                </div>
                <div>
                    <p class="text-sm text-emerald-300 font-semibold">Total Paid</p>
                    <p id="total-paid" class="text-xl sm:text-3xl font-bold">₹0</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-4 sm:p-6 flex items-center gap-4 sm:gap-6">
                <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-rose-500/20 flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-hourglass-half text-2xl sm:text-3xl text-rose-400"></i>
                </div>
                <div>
                    <p class="text-sm text-rose-300 font-semibold">Total Balance</p>
                    <p id="total-balance" class="text-xl sm:text-3xl font-bold">₹0</p>
                </div>
            </div>
        </div>

        <!-- Loan Cards -->
        <div id="loan-cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
            <!-- Loan cards will be injected here -->
        </div>

    </main>

    <!-- Repayment History Modal -->
    <div id="repayment-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-md p-0 sm:p-4">
        <div class="glass-card rounded-t-3xl sm:rounded-2xl w-full max-w-2xl flex flex-col max-h-[90vh]">
            <div class="drag-handle mt-3 sm:hidden"></div>
            <div class="p-4 sm:p-6 border-b border-white/10 flex justify-between items-center">
                <div>
                    <h3 class="text-lg sm:text-xl font-bold text-white">Repayment History</h3>
                    <p class="text-sm text-gray-400" id="modal-loan-name">Loan Name</p>
                </div>
                <button onclick="closeRepaymentModal()" class="icon-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-4 sm:p-6 overflow-y-auto flex-grow">
                <div id="repayment-grid" class="repayment-grid">
                    <!-- Months will be injected here -->
                </div>
            </div>

            <div class="p-4 sm:p-6 border-t border-white/10 flex justify-end" style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));">
                <button onclick="closeRepaymentModal()" class="px-6 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 active:bg-white/30 text-white font-semibold transition-all">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="payment-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-md p-0 sm:p-4">
        <div class="glass-card rounded-t-3xl sm:rounded-2xl w-full max-w-md flex flex-col max-h-[90vh] overflow-y-auto">
            <div class="drag-handle mt-3 sm:hidden"></div>
            <div class="p-4 sm:p-6 border-b border-white/10 flex justify-between items-center">
                <div>
                    <h3 class="text-lg sm:text-xl font-bold text-white">Record Payment</h3>
                    <p class="text-sm text-gray-400" id="payment-modal-loan-name">Loan Name</p>
                </div>
                <button onclick="closePaymentModal()" class="icon-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form id="paymentForm" class="p-4 sm:p-6 space-y-4" style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));">
                <input type="hidden" id="payment-loan-id">
                <input type="hidden" id="payment-loan-balance">

                <div class="form-group">
                    <label for="payment-date">Payment Date</label>
                    <div class="input-wrapper">
                        <input type="date" id="payment-date" name="date" required class="pl-4">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="payment-amount">Amount</label>
                    <div class="input-wrapper">
                        <input type="number" id="payment-amount" name="amount" required step="0.01" placeholder="0.00" class="pl-12" inputmode="decimal">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="payment-type">Payment Type</label>
                    <div class="input-wrapper">
                        <select id="payment-type" name="type" class="pl-12">
                            <option value="Principal">Principal Payment</option>
                            <option value="Full Settlement">Full Settlement</option>
                            <option value="Interest">Interest Payment</option>
                            <option value="EMI">EMI Payment</option>
                        </select>
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="payment-remarks">Remarks (Optional)</label>
                    <textarea id="payment-remarks" name="remarks" placeholder="Add any notes..." class="pl-4"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-white/10">
                    <button type="button" onclick="closePaymentModal()" class="px-5 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 active:bg-white/30 text-white font-semibold transition-all">
                        Cancel
                    </button>
                    <button type="submit" class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold transition-all">
                        Record Payment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Popup -->
    <div id="custom-popup" class="popup-overlay">
        <div class="popup-content">
            <div id="popup-icon-container" class="popup-icon">
                <!-- Icon will be inserted here -->
            </div>
            <h3 id="popup-title" class="text-xl font-bold text-white mb-2"></h3>
            <p id="popup-message" class="text-gray-300 mb-6"></p>
            <button onclick="closePopup()" class="bg-white/10 hover:bg-white/20 text-white py-2 px-6 rounded-lg font-semibold transition w-full">
                OK
            </button>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="w-16 h-16 border-4 border-t-transparent border-indigo-500 rounded-full animate-spin"></div>
    </div>

    <script>
        const SCRIPT_URL = CONFIG.GOOGLE_SHEET_URL_LOAN;
        let allData = [];
        let currentLoanId = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchLoans();
            document.getElementById('paymentForm').addEventListener('submit', handlePaymentSubmit);
        });

        function fetchLoans() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            fetch(`${SCRIPT_URL}?action=getLoans`)
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success') {
                        allData = result.data;
                        renderUI(allData);
                    } else {
                        throw new Error(result.message || 'Failed to fetch data');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loan-cards-container').innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
                })
                .finally(() => {
                    loader.classList.add('hidden');
                });
        }

        function renderUI(data) {
            const container = document.getElementById('loan-cards-container');
            container.innerHTML = '';

            let totalLoan = 0;
            let totalPaid = 0;

            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-400 col-span-full text-center">No loans found.</p>`;
            }

            data.forEach(loan => {
                const loanAmount = parseFloat(loan.amount) || 0;
                const paidAmount = parseFloat(loan.paid) || 0; // This will be calculated from transactions later
                const balance = loanAmount - paidAmount;
                const isClosed = loan.status === 'Closed';
                const interestRate = parseFloat(loan.interestRate) || 0;
                const tenure = parseInt(loan.tenure) || 0;

                // Calculate EMI (Simple Interest for estimation)
                const totalInterest = (loanAmount * interestRate * tenure) / 1200;
                const totalPayable = loanAmount + totalInterest;
                const emi = tenure > 0 ? totalPayable / tenure : 0;

                const emisPaid = emi > 0 ? Math.floor(paidAmount / emi) : 0;

                totalLoan += loanAmount;
                totalPaid += paidAmount;

                const card = document.createElement('div');
                card.className = `glass-card rounded-2xl p-6 flex flex-col gap-4 transition-all duration-300 ${isClosed ? 'opacity-60' : 'hover:border-indigo-500'}`;

                const percentage = loanAmount > 0 ? (paidAmount / loanAmount) * 100 : 0;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-lg font-bold">${loan.name}</p>
                            <p class="text-sm text-gray-400">${new Date(loan.date).toLocaleDateString('en-GB')}</p>
                        </div>
                        <div class="badge ${loan.type === 'Given' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}">${loan.type}</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="text-gray-400">Interest Rate</p>
                            <p class="font-semibold">${interestRate}%</p>
                        </div>
                        <div>
                            <p class="text-gray-400">Tenure</p>
                            <p class="font-semibold">${tenure} Months</p>
                        </div>
                        <div>
                            <p class="text-gray-400">EMI Amount</p>
                            <p class="font-semibold">₹${emi.toLocaleString('en-IN', {maximumFractionDigits: 0})}</p>
                        </div>
                        <div>
                            <p class="text-gray-400">EMIs Paid</p>
                            <p class="font-semibold">${emisPaid} / ${tenure}</p>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-baseline mb-1">
                            <span class="text-sm font-semibold text-gray-300">₹${paidAmount.toLocaleString('en-IN')} / ₹${loanAmount.toLocaleString('en-IN')}</span>
                            <span class="text-sm font-bold ${isClosed ? 'text-gray-400' : 'text-indigo-400'}">${percentage.toFixed(0)}%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2.5">
                            <div class="bg-indigo-500 h-2.5 rounded-full" style="width: ${percentage}%"></div>
                        </div>
                    </div>

                    <div class="text-sm text-gray-400 italic">
                        ${loan.remarks || 'No remarks.'}
                    </div>

                    <div class="mt-2 pt-4 border-t border-gray-700 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-400">Balance</p>
                            <p class="text-lg font-bold ${isClosed ? 'text-gray-500' : 'text-white'}">₹${balance.toLocaleString('en-IN')}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="viewRepaymentHistory('${loan.id}')" class="icon-btn !w-10 !h-10" title="View History">
                                <i class="fa-solid fa-history"></i>
                            </button>
                            <button onclick="openPaymentModal('${loan.id}', '${loan.name}', ${balance})" class="icon-btn !w-10 !h-10 bg-emerald-500/20 hover:bg-emerald-500 text-emerald-400 hover:text-white" title="Record Payment">
                                <i class="fa-solid fa-money-bill-wave"></i>
                            </button>
                            <a href="loan.html?id=${loan.id}" class="icon-btn !w-10 !h-10" title="Edit Loan">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('total-loan').textContent = `₹${totalLoan.toLocaleString('en-IN')}`;
            document.getElementById('total-paid').textContent = `₹${totalPaid.toLocaleString('en-IN')}`;
            document.getElementById('total-balance').textContent = `₹${(totalLoan - totalPaid).toLocaleString('en-IN')}`;
        }

        function viewRepaymentHistory(loanId) {
            currentLoanId = loanId;
            const loan = allData.find(l => l.id === loanId);
            if (!loan) return;

            document.getElementById('modal-loan-name').textContent = loan.name;
            const modal = document.getElementById('repayment-modal');
            const grid = document.getElementById('repayment-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-gray-400">Loading...</div>';

            modal.classList.remove('hidden');

            // Fetch repayment status
            fetch(`${SCRIPT_URL}?action=getRepaymentStatus&loanId=${loanId}`)
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success') {
                        renderRepaymentGrid(loan, result.data);
                    } else {
                        grid.innerHTML = '<div class="col-span-full text-center text-red-400">Failed to load history</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    grid.innerHTML = '<div class="col-span-full text-center text-red-400">Error loading history</div>';
                });
        }

        function renderRepaymentGrid(loan, historyData) {
            const grid = document.getElementById('repayment-grid');
            grid.innerHTML = '';

            const startDate = new Date(loan.date);
            const tenure = parseInt(loan.tenure) || 0;

            // Create a map for quick lookup: "YYYY-MM" -> status
            const historyMap = {};
            historyData.forEach(item => {
                const key = `${item.year}-${String(item.month).padStart(2, '0')}`;
                historyMap[key] = item.status;
            });

            for (let i = 0; i < tenure; i++) {
                const currentDate = new Date(startDate);
                currentDate.setMonth(startDate.getMonth() + i);

                const year = currentDate.getFullYear();
                const month = currentDate.getMonth() + 1;
                const monthName = currentDate.toLocaleString('default', { month: 'short' });
                const key = `${year}-${String(month).padStart(2, '0')}`;

                const status = historyMap[key] || 'Pending';
                const isPaid = status === 'Done';

                const box = document.createElement('div');
                box.className = `month-box ${isPaid ? 'paid' : 'pending'}`;
                box.innerHTML = `
                    <div class="text-xs font-bold">${monthName}</div>
                    <div class="text-[10px] opacity-70">${year}</div>
                    <div class="mt-1 text-[10px] uppercase tracking-wider font-bold">${status}</div>
                `;

                box.onclick = () => toggleMonthStatus(loan.id, year, month, status);

                grid.appendChild(box);
            }
        }

        function toggleMonthStatus(loanId, year, month, currentStatus) {
            const newStatus = currentStatus === 'Done' ? 'Pending' : 'Done';
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const payload = {
                action: 'updateRepaymentStatus',
                loanId: loanId,
                year: year,
                month: month,
                status: newStatus
            };

            fetch(`${SCRIPT_URL}?action=updateRepaymentStatus`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    // Refresh the grid
                    viewRepaymentHistory(loanId);
                    showPopup('Success', `Payment marked as ${newStatus}`, 'success');
                } else {
                    showPopup('Error', 'Failed to update status: ' + (result.message || 'Unknown error'), 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showPopup('Error', 'Error updating status: ' + err.message, 'error');
            })
            .finally(() => {
                loader.classList.add('hidden');
            });
        }

        function openPaymentModal(loanId, loanName, currentBalance) {
            document.getElementById('payment-loan-id').value = loanId;
            document.getElementById('payment-loan-balance').value = currentBalance;
            document.getElementById('payment-modal-loan-name').textContent = loanName;
            document.getElementById('payment-date').valueAsDate = new Date(); // Set default date to today
            document.getElementById('payment-amount').value = ''; // Clear previous amount
            document.getElementById('payment-type').value = 'Principal'; // Default payment type
            document.getElementById('payment-remarks').value = ''; // Clear previous remarks
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function handlePaymentSubmit(e) {
            e.preventDefault();
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            data.action = 'addTransaction';
            data.loanId = document.getElementById('payment-loan-id').value;
            data.amount = parseFloat(data.amount);
            data.date = formatDateForSheet(data.date); // Format date for sheet

            fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    showPopup('Success', 'Payment recorded successfully!', 'success');
                    closePaymentModal();
                    fetchLoans(); // Refresh loan data
                } else {
                    throw new Error(result.message || 'Unknown error occurred');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showPopup('Error', 'Error recording payment: ' + error.message, 'error');
            })
            .finally(() => {
                loader.classList.add('hidden');
            });
        }

        // Popup Functions
        function showPopup(title, message, type = 'success') {
            const popup = document.getElementById('custom-popup');
            const titleEl = document.getElementById('popup-title');
            const messageEl = document.getElementById('popup-message');
            const iconContainer = document.getElementById('popup-icon-container');

            titleEl.textContent = title;
            messageEl.textContent = message;

            // Reset classes
            popup.classList.remove('popup-success', 'popup-error');

            if (type === 'success') {
                popup.classList.add('popup-success');
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else {
                popup.classList.add('popup-error');
                iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }

            popup.classList.add('active');
        }

        function closePopup() {
            const popup = document.getElementById('custom-popup');
            popup.classList.remove('active');
        }

        function closeRepaymentModal() {
            document.getElementById('repayment-modal').classList.add('hidden');
        }

        // Helper function to format date for sheet (DD/MMM/YYYY)
        function formatDateForSheet(yyyyMmDd) {
            if (!yyyyMmDd) return '';
            const parts = yyyyMmDd.split('-');
            if (parts.length !== 3) return yyyyMmDd;
            const year = parts[0];
            const monthIndex = parseInt(parts[1], 10) - 1;
            const day = parts[2];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${day}/${months[monthIndex]}/${year}`;
        }

        // ===== MOBILE ENHANCEMENTS =====
        function showToast(msg, type = 'success', duration = 2800) {
            let toast = document.getElementById('kt-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'kt-toast';
                toast.className = 'kt-toast';
                document.body.appendChild(toast);
            }
            const icon = type === 'success' ? '✓' : '✕';
            const color = type === 'success' ? '#34d399' : '#f87171';
            toast.innerHTML = `<span style="color:${color};font-size:1rem;">${icon}</span> ${msg}`;
            toast.className = `kt-toast ${type}`;
            requestAnimationFrame(() => toast.classList.add('show'));
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // Pull-to-refresh
        (function() {
            const ptr = document.createElement('div');
            ptr.className = 'ptr-indicator';
            ptr.innerHTML = '<i class="fa-solid fa-arrows-rotate ptr-icon"></i><span class="ptr-text">Pull to refresh</span>';
            document.body.appendChild(ptr);
            let startY = 0, pulling = false;
            document.addEventListener('touchstart', e => { if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; } }, { passive: true });
            document.addEventListener('touchmove', e => {
                if (!pulling) return;
                const dy = e.touches[0].clientY - startY;
                if (dy > 30) { ptr.classList.add('visible'); ptr.querySelector('.ptr-text').textContent = dy > 80 ? 'Release to refresh' : 'Pull to refresh'; }
            }, { passive: true });
            document.addEventListener('touchend', e => {
                if (!pulling) return; pulling = false;
                const dy = e.changedTouches[0].clientY - startY;
                if (dy > 80) {
                    ptr.classList.add('refreshing'); ptr.querySelector('.ptr-text').textContent = 'Refreshing…';
                    if (navigator.vibrate) navigator.vibrate(30);
                    fetchLoans();
                    setTimeout(() => ptr.classList.remove('visible', 'refreshing'), 1200);
                } else ptr.classList.remove('visible');
            }, { passive: true });
        })();

        // Swipe down to close modals
        ['repayment-modal', 'payment-modal'].forEach(modalId => {
            const modal = document.getElementById(modalId);
            if (!modal) return;
            let swipeStartY = 0;
            modal.addEventListener('touchstart', e => { swipeStartY = e.touches[0].clientY; }, { passive: true });
            modal.addEventListener('touchend', e => {
                const dy = e.changedTouches[0].clientY - swipeStartY;
                if (dy > 100) {
                    if (modalId === 'repayment-modal') closeRepaymentModal();
                    else closePaymentModal();
                }
            }, { passive: true });
        });

    </script>
