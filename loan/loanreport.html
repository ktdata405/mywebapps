<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Report - Loan Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../config.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --accent: #ec4899;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Repayment Modal Styles */
        .repayment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .month-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .month-box:hover {
            border-color: var(--primary);
        }

        .month-box.paid {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            color: #34d399;
        }

        .month-box.pending {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        /* Popup Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
        }

        .popup-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
        }

        .popup-success .popup-icon {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .popup-error .popup-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
    </style>
</head>

<body class="min-h-screen">

    <nav class="sticky top-0 z-40 glass-card border-b-0 rounded-none">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="flex-shrink-0 text-white text-xl font-bold flex items-center gap-2">
                        <i class="fa-solid fa-hand-holding-dollar text-indigo-400"></i>
                        <span>Loan Report</span>
                    </a>
                </div>
                <div class="flex items-center gap-2">
                    <a href="loan.html" class="icon-btn" title="Add New Loan">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                    <button onclick="fetchLoans()" class="icon-btn" title="Refresh Data">
                        <i class="fa-solid fa-sync"></i>
                    </button>
                    <a href="../index.html" class="icon-btn" title="Home">
                        <i class="fa-solid fa-home"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card rounded-2xl p-6 flex items-center gap-6">
                <div class="w-16 h-16 rounded-full bg-indigo-500/20 flex items-center justify-center">
                    <i class="fa-solid fa-landmark text-3xl text-indigo-400"></i>
                </div>
                <div>
                    <p class="text-sm text-indigo-300 font-semibold">Total Loan Amount</p>
                    <p id="total-loan" class="text-3xl font-bold">₹0</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 flex items-center gap-6">
                <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center">
                    <i class="fa-solid fa-hand-holding-dollar text-3xl text-emerald-400"></i>
                </div>
                <div>
                    <p class="text-sm text-emerald-300 font-semibold">Total Paid</p>
                    <p id="total-paid" class="text-3xl font-bold">₹0</p>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 flex items-center gap-6">
                <div class="w-16 h-16 rounded-full bg-rose-500/20 flex items-center justify-center">
                    <i class="fa-solid fa-hourglass-half text-3xl text-rose-400"></i>
                </div>
                <div>
                    <p class="text-sm text-rose-300 font-semibold">Total Balance</p>
                    <p id="total-balance" class="text-3xl font-bold">₹0</p>
                </div>
            </div>
        </div>

        <!-- Loan Cards -->
        <div id="loan-cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loan cards will be injected here -->
        </div>

    </main>

    <!-- Repayment History Modal -->
    <div id="repayment-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass-card rounded-2xl w-full max-w-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-white">Repayment History</h3>
                    <p class="text-sm text-gray-400" id="modal-loan-name">Loan Name</p>
                </div>
                <button onclick="closeRepaymentModal()" class="icon-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto flex-grow">
                <div id="repayment-grid" class="repayment-grid">
                    <!-- Months will be injected here -->
                </div>
            </div>

            <div class="p-6 border-t border-white/10 flex justify-end">
                <button onclick="closeRepaymentModal()" class="px-6 py-2 rounded-xl bg-white/10 hover:bg-white/20 text-white font-semibold transition-all">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Custom Popup -->
    <div id="custom-popup" class="popup-overlay">
        <div class="popup-content">
            <div id="popup-icon-container" class="popup-icon">
                <!-- Icon will be inserted here -->
            </div>
            <h3 id="popup-title" class="text-xl font-bold text-white mb-2"></h3>
            <p id="popup-message" class="text-gray-300 mb-6"></p>
            <button onclick="closePopup()" class="bg-white/10 hover:bg-white/20 text-white py-2 px-6 rounded-lg font-semibold transition w-full">
                OK
            </button>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="w-16 h-16 border-4 border-t-transparent border-indigo-500 rounded-full animate-spin"></div>
    </div>

    <script>
        const SCRIPT_URL = CONFIG.GOOGLE_SHEET_URL_LOAN;
        let allData = [];
        let currentLoanId = null;

        document.addEventListener('DOMContentLoaded', fetchLoans);

        function fetchLoans() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            fetch(`${SCRIPT_URL}?action=getLoans`)
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success') {
                        allData = result.data;
                        renderUI(allData);
                    } else {
                        throw new Error(result.message || 'Failed to fetch data');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loan-cards-container').innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
                })
                .finally(() => {
                    loader.classList.add('hidden');
                });
        }

        function renderUI(data) {
            const container = document.getElementById('loan-cards-container');
            container.innerHTML = '';

            let totalLoan = 0;
            let totalPaid = 0;

            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-400 col-span-full text-center">No loans found.</p>`;
            }

            data.forEach(loan => {
                const loanAmount = parseFloat(loan.amount) || 0;
                const paidAmount = parseFloat(loan.paid) || 0;
                const balance = loanAmount - paidAmount;
                const isClosed = loan.status === 'Closed';
                const interestRate = parseFloat(loan.interestRate) || 0;
                const tenure = parseInt(loan.tenure) || 0;

                // Calculate EMI (Simple Interest for estimation)
                const totalInterest = (loanAmount * interestRate * tenure) / 1200;
                const totalPayable = loanAmount + totalInterest;
                const emi = tenure > 0 ? totalPayable / tenure : 0;

                const emisPaid = emi > 0 ? Math.floor(paidAmount / emi) : 0;

                totalLoan += loanAmount;
                totalPaid += paidAmount;

                const card = document.createElement('div');
                card.className = `glass-card rounded-2xl p-6 flex flex-col gap-4 transition-all duration-300 ${isClosed ? 'opacity-60' : 'hover:border-indigo-500'}`;

                const percentage = loanAmount > 0 ? (paidAmount / loanAmount) * 100 : 0;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-lg font-bold">${loan.name}</p>
                            <p class="text-sm text-gray-400">${new Date(loan.date).toLocaleDateString('en-GB')}</p>
                        </div>
                        <div class="badge ${loan.type === 'Given' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}">${loan.type}</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="text-gray-400">Interest Rate</p>
                            <p class="font-semibold">${interestRate}%</p>
                        </div>
                        <div>
                            <p class="text-gray-400">Tenure</p>
                            <p class="font-semibold">${tenure} Months</p>
                        </div>
                        <div>
                            <p class="text-gray-400">EMI Amount</p>
                            <p class="font-semibold">₹${emi.toLocaleString('en-IN', {maximumFractionDigits: 0})}</p>
                        </div>
                        <div>
                            <p class="text-gray-400">EMIs Paid</p>
                            <p class="font-semibold">${emisPaid} / ${tenure}</p>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-baseline mb-1">
                            <span class="text-sm font-semibold text-gray-300">₹${paidAmount.toLocaleString('en-IN')} / ₹${loanAmount.toLocaleString('en-IN')}</span>
                            <span class="text-sm font-bold ${isClosed ? 'text-gray-400' : 'text-indigo-400'}">${percentage.toFixed(0)}%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2.5">
                            <div class="bg-indigo-500 h-2.5 rounded-full" style="width: ${percentage}%"></div>
                        </div>
                    </div>

                    <div class="text-sm text-gray-400 italic">
                        ${loan.remarks || 'No remarks.'}
                    </div>

                    <div class="mt-2 pt-4 border-t border-gray-700 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-400">Balance</p>
                            <p class="text-lg font-bold ${isClosed ? 'text-gray-500' : 'text-white'}">₹${balance.toLocaleString('en-IN')}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="viewRepaymentHistory('${loan.id}')" class="icon-btn !w-10 !h-10" title="View History">
                                <i class="fa-solid fa-history"></i>
                            </button>
                            <a href="loan.html?id=${loan.id}" class="icon-btn !w-10 !h-10" title="Edit Loan">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('total-loan').textContent = `₹${totalLoan.toLocaleString('en-IN')}`;
            document.getElementById('total-paid').textContent = `₹${totalPaid.toLocaleString('en-IN')}`;
            document.getElementById('total-balance').textContent = `₹${(totalLoan - totalPaid).toLocaleString('en-IN')}`;
        }

        function viewRepaymentHistory(loanId) {
            currentLoanId = loanId;
            const loan = allData.find(l => l.id === loanId);
            if (!loan) return;

            document.getElementById('modal-loan-name').textContent = loan.name;
            const modal = document.getElementById('repayment-modal');
            const grid = document.getElementById('repayment-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-gray-400">Loading...</div>';

            modal.classList.remove('hidden');

            // Fetch repayment status
            fetch(`${SCRIPT_URL}?action=getRepaymentStatus&loanId=${loanId}`)
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success') {
                        renderRepaymentGrid(loan, result.data);
                    } else {
                        grid.innerHTML = '<div class="col-span-full text-center text-red-400">Failed to load history</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    grid.innerHTML = '<div class="col-span-full text-center text-red-400">Error loading history</div>';
                });
        }

        function renderRepaymentGrid(loan, historyData) {
            const grid = document.getElementById('repayment-grid');
            grid.innerHTML = '';

            const startDate = new Date(loan.date);
            const tenure = parseInt(loan.tenure) || 0;

            // Create a map for quick lookup: "YYYY-MM" -> status
            const historyMap = {};
            historyData.forEach(item => {
                const key = `${item.year}-${String(item.month).padStart(2, '0')}`;
                historyMap[key] = item.status;
            });

            for (let i = 0; i < tenure; i++) {
                const currentDate = new Date(startDate);
                currentDate.setMonth(startDate.getMonth() + i);

                const year = currentDate.getFullYear();
                const month = currentDate.getMonth() + 1;
                const monthName = currentDate.toLocaleString('default', { month: 'short' });
                const key = `${year}-${String(month).padStart(2, '0')}`;

                const status = historyMap[key] || 'Pending';
                const isPaid = status === 'Done';

                const box = document.createElement('div');
                box.className = `month-box ${isPaid ? 'paid' : 'pending'}`;
                box.innerHTML = `
                    <div class="text-xs font-bold">${monthName}</div>
                    <div class="text-[10px] opacity-70">${year}</div>
                    <div class="mt-1 text-[10px] uppercase tracking-wider font-bold">${status}</div>
                `;

                box.onclick = () => toggleMonthStatus(loan.id, year, month, status);

                grid.appendChild(box);
            }
        }

        function toggleMonthStatus(loanId, year, month, currentStatus) {
            const newStatus = currentStatus === 'Done' ? 'Pending' : 'Done';
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const payload = {
                action: 'updateRepaymentStatus',
                loanId: loanId,
                year: year,
                month: month,
                status: newStatus
            };

            fetch(`${SCRIPT_URL}?action=updateRepaymentStatus`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    // Refresh the grid
                    viewRepaymentHistory(loanId);
                    showPopup('Success', `Payment marked as ${newStatus}`, 'success');
                } else {
                    showPopup('Error', 'Failed to update status: ' + (result.message || 'Unknown error'), 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showPopup('Error', 'Error updating status: ' + err.message, 'error');
            })
            .finally(() => {
                loader.classList.add('hidden');
            });
        }

        // Popup Functions
        function showPopup(title, message, type = 'success') {
            const popup = document.getElementById('custom-popup');
            const titleEl = document.getElementById('popup-title');
            const messageEl = document.getElementById('popup-message');
            const iconContainer = document.getElementById('popup-icon-container');

            titleEl.textContent = title;
            messageEl.textContent = message;

            // Reset classes
            popup.classList.remove('popup-success', 'popup-error');

            if (type === 'success') {
                popup.classList.add('popup-success');
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else {
                popup.classList.add('popup-error');
                iconContainer.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }

            popup.classList.add('active');
        }

        function closePopup() {
            const popup = document.getElementById('custom-popup');
            popup.classList.remove('active');
        }

        function closeRepaymentModal() {
            document.getElementById('repayment-modal').classList.add('hidden');
        }

    </script>

</body>

</html>
